function runApp() {
  try {
    var src = decodeURIComponent(escape(atob(_JSX_B64)));
    var result = Babel.transform(src, {
      presets: [['react', {pragma: 'React.createElement', pragmaFrag: 'React.Fragment'}]],
      filename: 'app.jsx',
      sourceType: 'script'
    });
    try {
      (0,eval)(result.code);
    } catch(evalErr) {
      document.getElementById('root').innerHTML =
        '<div style="font-family:monospace;padding:20px;background:#1a1a1a;color:#ff6b6b;font-size:12px;white-space:pre-wrap">' +
        '<b>Runtime error:</b> ' + evalErr.message +
        (evalErr.stack ? '\n' + evalErr.stack.substring(0,800) : '') + '</div>';
    }
  } catch(babelErr) {
    var msg = babelErr.message || String(babelErr);
    var loc = babelErr.loc ? ' (riga '+babelErr.loc.line+', col '+babelErr.loc.column+')' : '';
    var frame = babelErr.codeFrame ? '\n\n' + babelErr.codeFrame : '';
    document.getElementById('root').innerHTML =
      '<div style="font-family:monospace;padding:20px;background:#1a1a1a;color:#ff6b6b;font-size:12px;white-space:pre-wrap">' +
      '<b>Babel error:</b> ' + msg + loc + frame + '</div>';
    console.error('Babel error:', babelErr);
  }
}

// Storage shim: localStorage -> Backend API (Neon DB)
var _storageCache = {};
(function() {
  var fakeLS = {
    getItem: function(key) {
      if (typeof key === 'string' && key.indexOf('gs_') === 0) {
        return (_storageCache[key] !== undefined) ? _storageCache[key] : null;
      }
      return null;
    },
    setItem: function(key, value) {
      if (typeof key === 'string' && key.indexOf('gs_') === 0) {
        _storageCache[key] = value;
        var ak = key.substring(3);
        fetch('/api/storage/' + encodeURIComponent(ak), {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({value: value})
        }).catch(function(e){ console.error('[Storage] Errore:', e); });
      }
    },
    removeItem: function(key) { delete _storageCache[key]; },
    key: function(n) { return null; },
    clear: function() {},
    get length() { return 0; }
  };
  try {
    Object.defineProperty(window, 'localStorage', {
      get: function() { return fakeLS; },
      configurable: true
    });
    console.log('[Storage] Shim attivo - dati su Neon');
  } catch(e) { console.warn('[Storage] Shim fallito:', e); }
})();

// Avvio: aspetta Babel, carica dati dal backend, poi lancia app
var _t = setInterval(function() {
  if (typeof Babel !== 'undefined') {
    clearInterval(_t);
    var rootEl = document.getElementById('root');
    if (rootEl) rootEl.innerHTML = '<div style="padding:20px;color:#666;font-size:14px">Caricamento dati...</div>';
    var keys = ['expenses_marco','incomes_marco','partner_marco','expenses_anna','incomes_anna','partner_anna'];
    var loaded = 0;
    keys.forEach(function(ak) {
      fetch('/api/storage/' + encodeURIComponent(ak))
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(data){
          if (data && data.value !== undefined && data.value !== null) {
            _storageCache['gs_' + ak] = data.value;
          }
          loaded++;
          if (loaded === keys.length) {
            console.log('[App] Dati caricati:', Object.keys(_storageCache).length, 'chiavi');
            runApp();
          }
        })
        .catch(function(e){
          loaded++;
          if (loaded === keys.length) { runApp(); }
        });
    });
  }
}, 30);
</script>
