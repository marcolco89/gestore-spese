<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestore Spese</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:15px}
.app{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
h1{font-size:20px;font-weight:500;margin-bottom:1.5rem;display:flex;align-items:center;gap:8px}
.tabs{display:flex;gap:2px;margin-bottom:1.5rem;border-bottom:1px solid rgba(0,0,0,.15);overflow-x:auto}
.tab{padding:8px 14px;cursor:pointer;font-size:13px;border:none;background:none;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;display:flex;align-items:center;gap:5px}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.card{background:#fff;border:0.5px solid rgba(0,0,0,.15);border-radius:12px;padding:1.25rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
label{font-size:11px;color:#666;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
input,select{width:100%;padding:8px 10px;border:0.5px solid rgba(0,0,0,.3);border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;outline:none}
input:focus,select:focus{border-color:rgba(0,0,0,.4);box-shadow:0 0 0 3px rgba(0,0,0,.06)}
.bp-box{background:#f0f0ea;border-radius:10px;padding:12px;margin-top:4px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;align-items:end}
.bp-result{font-size:13px;color:#666;padding-bottom:9px}
.bp-result span{font-weight:500;color:#1a1a1a}
.btn{padding:9px 18px;border-radius:8px;border:0.5px solid rgba(0,0,0,.3);background:transparent;color:#1a1a1a;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:#f0f0ea}
.btn.primary{background:#1a1a1a;color:#fff;border-color:transparent}
.btn.primary:hover{opacity:.85}
.btn.success{background:#0F6E56;color:#fff;border-color:transparent}
.btn.success:hover{opacity:.85}
.btn.anna{background:#993556;color:#fff;border-color:transparent}
.btn.anna:hover{opacity:.85}
.btn.danger{color:#a32d2d;border-color:transparent}
.btn.danger:hover{background:#fcebeb}
.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem}
.month-section{margin-bottom:1.5rem}
.month-header{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.15);margin-bottom:.75rem}
.month-header h2{font-size:16px;font-weight:500}
.cat-block{margin-bottom:.75rem}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#f0f0ea;border-radius:8px;margin-bottom:4px;font-size:13px;font-weight:500}
.cat-label{display:flex;align-items:center;gap:6px}
.expense-row{display:grid;grid-template-columns:72px 1fr auto auto;gap:8px;align-items:center;padding:6px 10px;font-size:13px;border-bottom:0.5px solid rgba(0,0,0,.1)}
.expense-row:last-child{border-bottom:none}
.income-row{display:grid;grid-template-columns:72px 1fr auto auto;gap:8px;align-items:center;padding:6px 10px;font-size:13px;border-bottom:0.5px solid rgba(0,0,0,.1)}
.income-row:last-child{border-bottom:none}
.exp-date{color:#666;font-size:12px}
.exp-amount{font-weight:500;white-space:nowrap}
.exp-delete{opacity:0;transition:opacity .15s;cursor:pointer;background:none;border:none;color:#a32d2d;font-size:16px;padding:2px 4px}
.expense-row:hover .exp-delete,.income-row:hover .exp-delete{opacity:1}
.anna-row{display:grid;grid-template-columns:90px 1fr 100px auto auto;gap:8px;align-items:center;padding:8px 10px;font-size:13px;border-bottom:0.5px solid rgba(0,0,0,.1)}
.anna-row:last-child{border-bottom:none}
.anna-row:hover .exp-delete{opacity:1}
.empty{text-align:center;padding:3rem 1rem;color:#666;font-size:14px}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem}
.metric{background:#f0f0ea;border-radius:8px;padding:12px}
.metric-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.metric-value{font-size:20px;font-weight:500}
.metric.green{background:#E1F5EE}
.metric.green .metric-label{color:#0F6E56}
.metric.green .metric-value{color:#085041}
.metric.red{background:#FCEBEB}
.metric.red .metric-label{color:#993C1D}
.metric.red .metric-value{color:#711B0B}
.metric.pink{background:#FBEAF0}
.metric.pink .metric-label{color:#993556}
.metric.pink .metric-value{color:#72243E}
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-bar select{max-width:160px;padding:6px 10px;font-size:13px}
.flag-anna{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f0f0ea;border-radius:8px;cursor:pointer;user-select:none;font-size:13px}
.flag-anna input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#993556}
.anna-saldo-box{border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;background:#fff;border:0.5px solid rgba(0,0,0,.15)}
.anna-saldo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
#page-add,#page-income,#page-list,#page-summary,#page-anna{display:none}
#page-add.visible,#page-income.visible,#page-list.visible,#page-summary.visible,#page-anna.visible{display:block}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a1a;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.anna-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:5px;font-size:10px;font-weight:500;background:#FBEAF0;color:#993556;margin-left:4px}
.loading-bar{position:fixed;top:0;left:0;height:2px;background:#185FA5;width:0;transition:width .3s;z-index:999}
</style>
</head>
<body>
<div class="loading-bar" id="loading-bar"></div>
<div class="app">
  <h1><i class="ti ti-wallet" aria-hidden="true"></i> Gestore Spese &amp; Entrate</h1>
  <div class="tabs">
    <button class="tab active" onclick="showTab('add')"><i class="ti ti-minus" aria-hidden="true"></i> Nuova spesa</button>
    <button class="tab" onclick="showTab('income')"><i class="ti ti-plus" aria-hidden="true"></i> Nuova entrata</button>
    <button class="tab" onclick="showTab('list')"><i class="ti ti-list" aria-hidden="true"></i> Storico</button>
    <button class="tab" onclick="showTab('summary')"><i class="ti ti-chart-bar" aria-hidden="true"></i> Riepilogo</button>
    <button class="tab" onclick="showTab('anna')"><i class="ti ti-users" aria-hidden="true"></i> Debiti/Crediti Anna</button>
  </div>

  <!-- NUOVA SPESA -->
  <div id="page-add" class="visible">
    <div class="card">
      <div class="form-grid">
        <div class="form-group">
          <label>Importo (€)</label>
          <input type="number" id="inp-amount" min="0" step="0.01" placeholder="0,00">
        </div>
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="inp-date">
        </div>
        <div class="form-group full">
          <label>Descrizione</label>
          <input type="text" id="inp-desc" placeholder="Es. Visita medica, Carburante...">
        </div>
        <div class="form-group full">
          <label>Categoria</label>
          <select id="inp-cat" onchange="toggleBP()">
            <option value="">— Seleziona categoria —</option>
            <option>Utenze</option><option>Spese Mediche</option><option>Viaggi</option>
            <option>Auto</option><option>Casa</option><option>Pasti fuori</option>
            <option>Spesa alimentare</option><option>Shopping</option><option>Svago</option>
            <option>Cane</option><option>Regali</option><option>Alice</option><option>Mutuo</option>
          </select>
        </div>
        <div class="form-group full" id="bp-section" style="display:none">
          <label>Buoni pasto</label>
          <div class="bp-box">
            <div class="form-group">
              <label>N° buoni</label>
              <input type="number" id="inp-bp-num" min="0" step="1" placeholder="0" oninput="calcBP()">
            </div>
            <div class="form-group">
              <label>Valore buono (€)</label>
              <input type="number" id="inp-bp-val" min="0" step="0.01" value="8" oninput="calcBP()">
            </div>
            <div class="bp-result" id="bp-result">Sconto: <span>€ 0,00</span></div>
          </div>
        </div>
        <div class="form-group full">
          <label class="flag-anna">
            <input type="checkbox" id="inp-anna">
            <span>Da spartire con Anna</span>
          </label>
        </div>
        <div class="form-group full">
          <label>Note (opzionale)</label>
          <input type="text" id="inp-note" placeholder="Informazioni aggiuntive...">
        </div>
      </div>
      <div class="actions">
        <button class="btn" onclick="clearExpForm()"><i class="ti ti-refresh" aria-hidden="true"></i> Cancella</button>
        <button class="btn primary" onclick="addExpense()"><i class="ti ti-check" aria-hidden="true"></i> Salva spesa</button>
      </div>
    </div>
  </div>

  <!-- NUOVA ENTRATA -->
  <div id="page-income">
    <div class="card">
      <div class="form-grid">
        <div class="form-group">
          <label>Importo (€)</label>
          <input type="number" id="inc-amount" min="0" step="0.01" placeholder="0,00">
        </div>
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="inc-date">
        </div>
        <div class="form-group full">
          <label>Descrizione</label>
          <input type="text" id="inc-desc" placeholder="Es. Stipendio, Rimborso...">
        </div>
        <div class="form-group full">
          <label>Buoni pasto (opzionale)</label>
          <div class="bp-box">
            <div class="form-group">
              <label>N° buoni</label>
              <input type="number" id="inc-bp-num" min="0" step="1" placeholder="0" oninput="calcIncBP()">
            </div>
            <div class="form-group">
              <label>Valore buono (€)</label>
              <input type="number" id="inc-bp-val" min="0" step="0.01" value="8" oninput="calcIncBP()">
            </div>
            <div class="bp-result" id="inc-bp-result">Totale: <span>€ 0,00</span></div>
          </div>
        </div>
        <div class="form-group full">
          <label>Note (opzionale)</label>
          <input type="text" id="inc-note" placeholder="Informazioni aggiuntive...">
        </div>
      </div>
      <div class="actions">
        <button class="btn" onclick="clearIncForm()"><i class="ti ti-refresh" aria-hidden="true"></i> Cancella</button>
        <button class="btn success" onclick="addIncome()"><i class="ti ti-check" aria-hidden="true"></i> Salva entrata</button>
      </div>
    </div>
  </div>

  <!-- STORICO -->
  <div id="page-list">
    <div class="filter-bar">
      <select id="f-month" onchange="renderList()"><option value="">Tutti i mesi</option></select>
      <select id="f-cat" onchange="renderList()">
        <option value="">Tutte le categorie</option>
        <option>Utenze</option><option>Spese Mediche</option><option>Viaggi</option>
        <option>Auto</option><option>Casa</option><option>Pasti fuori</option>
        <option>Spesa alimentare</option><option>Shopping</option><option>Svago</option>
        <option>Cane</option><option>Regali</option><option>Alice</option><option>Mutuo</option>
      </select>
      <div style="flex:1"></div>
      <button class="btn" onclick="exportCSV()"><i class="ti ti-download" aria-hidden="true"></i> Esporta CSV</button>
    </div>
    <div id="list-container"></div>
  </div>

  <!-- RIEPILOGO -->
  <div id="page-summary">
    <div id="summary-container"></div>
  </div>

  <!-- DEBITI/CREDITI ANNA -->
  <div id="page-anna">
    <div class="anna-saldo-box">
      <div class="anna-saldo-grid">
        <div class="metric red"><div class="metric-label">Tu devi ad Anna</div><div class="metric-value" id="anna-debito">€ 0,00</div></div>
        <div class="metric green"><div class="metric-label">Anna ti deve</div><div class="metric-value" id="anna-credito">€ 0,00</div></div>
        <div class="metric pink"><div class="metric-label">Saldo netto</div><div class="metric-value" id="anna-saldo">€ 0,00</div></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:1.5rem;border:0.5px solid #E1F5EE">
      <div style="font-size:13px;font-weight:500;color:#085041;margin-bottom:12px;display:flex;align-items:center;gap:6px"><i class="ti ti-cash" aria-hidden="true"></i> Registra pagamento di Anna</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Importo pagato da Anna (€)</label>
          <input type="number" id="anna-pay-amount" min="0" step="0.01" placeholder="0,00" oninput="calcAnnaPay()">
        </div>
        <div class="form-group">
          <label>Saldo residuo dopo pagamento</label>
          <div id="anna-pay-preview" style="padding:9px 10px;background:#f0f0ea;border-radius:8px;font-size:14px;color:#666">— inserisci importo</div>
        </div>
      </div>
      <div class="actions">
        <button class="btn success" onclick="addAnnaPay()"><i class="ti ti-check" aria-hidden="true"></i> Registra pagamento</button>
      </div>
    </div>
    <div class="card" style="margin-bottom:1.5rem">
      <div class="form-grid">
        <div class="form-group full">
          <label>Descrizione</label>
          <input type="text" id="anna-desc" placeholder="Es. Spesa supermercato, Cena...">
        </div>
        <div class="form-group">
          <label>Importo (€) — Anna ha anticipato</label>
          <input type="number" id="anna-amount" min="0" step="0.01" placeholder="0,00">
        </div>
        <div class="form-group">
          <label>Mese</label>
          <select id="anna-month">
            <option value="2026-01">Gennaio 2026</option>
            <option value="2026-02">Febbraio 2026</option>
            <option value="2026-03">Marzo 2026</option>
            <option value="2026-04">Aprile 2026</option>
            <option value="2026-05">Maggio 2026</option>
            <option value="2026-06" selected>Giugno 2026</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Categoria</label>
          <select id="anna-cat">
            <option value="">— Seleziona categoria —</option>
            <option>Utenze</option><option>Spese Mediche</option><option>Viaggi</option>
            <option>Auto</option><option>Casa</option><option>Pasti fuori</option>
            <option>Spesa alimentare</option><option>Shopping</option><option>Svago</option>
            <option>Cane</option><option>Regali</option><option>Alice</option><option>Mutuo</option>
          </select>
        </div>
      </div>
      <div class="actions">
        <button class="btn anna" onclick="addAnnaDebt()"><i class="ti ti-user-plus" aria-hidden="true"></i> Aggiungi debito verso Anna</button>
      </div>
    </div>
    <div id="anna-container"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── Storage API: chiama il backend invece di window.storage ──────────────────
var storage = {
  get: function(key) {
    return fetch('/api/storage/' + encodeURIComponent(key))
      .then(function(r) { return r.ok ? r.json() : null; })
      .catch(function() { return null; });
  },
  set: function(key, value) {
    return fetch('/api/storage/' + encodeURIComponent(key), {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({value: value})
    }).then(function(r) { return r.json(); })
      .catch(function() { return null; });
  }
};

function fmt(n){ return Number(n).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function monthKey(date){ var d=new Date(date); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function monthLabel(key){ var p=key.split('-'); return MONTHS[parseInt(p[1])-1]+' '+p[0]; }
function fmtDate(date){ return new Date(date+'T12:00').toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'}); }

function load(){
  var today = new Date().toISOString().slice(0,10);
  document.getElementById('inp-date').value = today;
  document.getElementById('inc-date').value = today;
  loading(true);
  Promise.all([
    storage.get('expenses_2026'),
    storage.get('incomes_2026'),
    storage.get('anna_2026')
  ]).then(function(results) {
    var re = results[0], ri = results[1], ra = results[2];
    if(re && re.value){try{expenses=JSON.parse(re.value);}catch(e){expenses=[];}}
    if(ri && ri.value){try{incomes=JSON.parse(ri.value);}catch(e){incomes=[];}}
    if(ra && ra.value){try{annaItems=JSON.parse(ra.value);}catch(e){annaItems=[];}}
    loadPreloaded();
    loadPreloadedIncomes();
    populateMonthFilter();
    loading(false);
  }).catch(function() {
    loadPreloaded();
    loadPreloadedIncomes();
    populateMonthFilter();
    loading(false);
  });
}

function saveExp(){ storage.set('expenses_2026',JSON.stringify(expenses)); }
function saveInc(){ storage.set('incomes_2026',JSON.stringify(incomes)); }
function saveAnna(){ storage.set('anna_2026',JSON.stringify(annaItems)); }

function loadPreloaded(){
  var seen={};
  expenses.forEach(function(e){ seen[e.id]=1; });
  var added=0;
  PRELOADED.forEach(function(e){ if(!seen[e.id]){expenses.push(e);added++;} });
  if(added>0){ expenses.sort(function(a,b){return new Date(b.date)-new Date(a.date);}); saveExp(); }
}

function loadPreloadedIncomes(){
  var seen={};
  incomes.forEach(function(i){ seen[i.id]=1; });
  var added=0;
  PRELOADED_INCOMES.forEach(function(i){ if(!seen[i.id]){incomes.push(i);added++;} });
  if(added>0){ incomes.sort(function(a,b){return new Date(b.date)-new Date(a.date);}); saveInc(); }
}

function toggleBP(){
  var cat=document.getElementById('inp-cat').value;
  var show=cat==='Spesa alimentare';
  document.getElementById('bp-section').style.display=show?'block':'none';
  if(!show){document.getElementById('inp-bp-num').value='';calcBP();}
}

function calcBP(){
  var n=parseFloat(document.getElementById('inp-bp-num').value)||0;
  var v=parseFloat(document.getElementById('inp-bp-val').value)||8;
  document.getElementById('bp-result').innerHTML='Sconto: <span>€ '+fmt(n*v)+'</span>';
}

function calcIncBP(){
  var n=parseFloat(document.getElementById('inc-bp-num').value)||0;
  var v=parseFloat(document.getElementById('inc-bp-val').value)||8;
  var total=n*v;
  document.getElementById('inc-bp-result').innerHTML='Totale: <span>€ '+fmt(total)+'</span>';
  if(n>0){
    document.getElementById('inc-amount').value=total.toFixed(2);
    var date=document.getElementById('inc-date').value;
    if(date){var d=new Date(date+'T12:00');document.getElementById('inc-desc').value='Buoni pasto '+MONTHS[d.getMonth()];}
  }
}

function addExpense(){
  var amount=parseFloat(document.getElementById('inp-amount').value);
  var date=document.getElementById('inp-date').value;
  var desc=document.getElementById('inp-desc').value.trim();
  var cat=document.getElementById('inp-cat').value;
  var note=document.getElementById('inp-note').value.trim();
  var splitAnna=document.getElementById('inp-anna').checked;
  if(!amount||amount<=0){toast('Inserisci un importo valido');return;}
  if(!date){toast('Inserisci la data');return;}
  if(!desc){toast('Inserisci la descrizione');return;}
  if(!cat){toast('Seleziona una categoria');return;}
  var bp=null;
  if(cat==='Spesa alimentare'){
    var bpn=parseFloat(document.getElementById('inp-bp-num').value)||0;
    var bpv=parseFloat(document.getElementById('inp-bp-val').value)||8;
    if(bpn>0) bp={num:bpn,val:bpv,total:bpn*bpv};
  }
  var expAmount=splitAnna?Math.round(amount/2*100)/100:amount;
  expenses.push({id:Date.now(),amount:expAmount,date:date,desc:desc+(splitAnna?' (50%)':''),cat:cat,note:note,bp:bp,anna:splitAnna});
  expenses.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  if(splitAnna){
    var half=Math.round(amount/2*100)/100;
    annaItems.push({id:Date.now()+1,desc:desc,amount:half,cat:cat,date:date,type:'credito',expId:null,note:'50% spesa spartita'});
    annaItems.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
    saveAnna();
  }
  saveExp(); populateMonthFilter(); clearExpForm();
  toast(splitAnna?'Spesa salvata: metà in storico, metà come credito Anna ✓':'Spesa salvata ✓');
}

function addIncome(){
  var amount=parseFloat(document.getElementById('inc-amount').value);
  var date=document.getElementById('inc-date').value;
  var desc=document.getElementById('inc-desc').value.trim();
  var note=document.getElementById('inc-note').value.trim();
  var bpn=parseFloat(document.getElementById('inc-bp-num').value)||0;
  var bpv=parseFloat(document.getElementById('inc-bp-val').value)||8;
  if(bpn>0) amount=Math.round(bpn*bpv*100)/100;
  if(!amount||amount<=0){toast('Inserisci un importo valido');return;}
  if(!date){toast('Inserisci la data');return;}
  if(!desc){toast('Inserisci la descrizione');return;}
  var bp=bpn>0?{num:bpn,val:bpv,total:bpn*bpv}:null;
  incomes.push({id:Date.now(),amount:amount,date:date,desc:desc,note:note,bp:bp});
  incomes.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  saveInc(); populateMonthFilter(); clearIncForm();
  toast('Entrata salvata ✓');
}

function calcAnnaPay(){
  var amount=parseFloat(document.getElementById('anna-pay-amount').value)||0;
  var debiti=annaItems.filter(function(a){return a.type==='debito';}).reduce(function(s,a){return s+a.amount;},0);
  var crediti=annaItems.filter(function(a){return a.type==='credito';}).reduce(function(s,a){return s+a.amount;},0);
  var saldoAttuale=debiti-crediti;
  var prev=document.getElementById('anna-pay-preview');
  if(!amount){prev.textContent='— inserisci importo';prev.style.color='#666';return;}
  var residuo=saldoAttuale-amount;
  if(residuo>0){prev.textContent='Residuo debito: € '+fmt(residuo);prev.style.color='#a32d2d';}
  else if(residuo<0){prev.textContent='Credito in eccesso: + € '+fmt(Math.abs(residuo));prev.style.color='#085041';}
  else{prev.textContent='Saldo azzerato ✓';prev.style.color='#085041';}
}

function addAnnaPay(){
  var amount=parseFloat(document.getElementById('anna-pay-amount').value);
  if(!amount||amount<=0){toast('Inserisci un importo valido');return;}
  var now=new Date();
  var dd=String(now.getDate()).padStart(2,'0');
  var mm=String(now.getMonth()+1).padStart(2,'0');
  var yy=String(now.getFullYear());
  var dateStr=now.toISOString().slice(0,10);
  annaItems.push({id:Date.now(),desc:'Pagamento alla data '+dd+'.'+mm+'.'+yy,amount:amount,cat:'',date:dateStr,type:'pagamento',expId:null,note:''});
  annaItems.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  saveAnna();
  document.getElementById('anna-pay-amount').value='';
  document.getElementById('anna-pay-preview').textContent='— inserisci importo';
  document.getElementById('anna-pay-preview').style.color='#666';
  renderAnna();
  toast('Pagamento registrato ✓');
}

function addAnnaDebt(){
  var desc=document.getElementById('anna-desc').value.trim();
  var amount=parseFloat(document.getElementById('anna-amount').value);
  var month=document.getElementById('anna-month').value;
  var cat=document.getElementById('anna-cat').value;
  if(!desc){toast('Inserisci la descrizione');return;}
  if(!amount||amount<=0){toast('Inserisci un importo valido');return;}
  if(!cat){toast('Seleziona una categoria');return;}
  var date=month+'-01';
  var expId=Date.now();
  expenses.push({id:expId,amount:amount,date:date,desc:desc+' (Anna)',cat:cat,note:'Anticipato da Anna',bp:null,anna:false,annaDebt:true});
  expenses.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  saveExp();
  annaItems.push({id:Date.now()+1,desc:desc,amount:amount,cat:cat,date:date,type:'debito',expId:expId,note:'Anna ha anticipato'});
  annaItems.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  saveAnna();
  document.getElementById('anna-desc').value='';
  document.getElementById('anna-amount').value='';
  document.getElementById('anna-cat').value='';
  populateMonthFilter();
  renderAnna();
  toast('Debito verso Anna aggiunto ✓');
}

function deleteExpense(id){
  var exp=expenses.filter(function(e){return e.id===id;})[0];
  expenses=expenses.filter(function(e){return e.id!==id;});
  saveExp();
  if(exp){
    var before=annaItems.length;
    if(exp.annaDebt) annaItems=annaItems.filter(function(a){return a.expId!==id;});
    if(exp.anna) annaItems=annaItems.filter(function(a){return !(a.type==='credito'&&a.desc===exp.desc.replace(' (50%)','')&&monthKey(a.date)===monthKey(exp.date));});
    if(annaItems.length!==before) saveAnna();
  }
  renderList(); renderSummary(); toast('Spesa eliminata');
}
function deleteIncome(id){
  incomes=incomes.filter(function(i){return i.id!==id;});
  saveInc(); renderList(); renderSummary(); toast('Entrata eliminata');
}
function deleteAnna(id){
  var item=annaItems.filter(function(a){return a.id===id;})[0];
  annaItems=annaItems.filter(function(a){return a.id!==id;});
  if(item&&item.expId){expenses=expenses.filter(function(e){return e.id!==item.expId;});saveExp();}
  saveAnna(); renderAnna(); renderList(); toast('Voce eliminata');
}

function clearExpForm(){
  document.getElementById('inp-amount').value='';
  document.getElementById('inp-desc').value='';
  document.getElementById('inp-note').value='';
  document.getElementById('inp-cat').value='';
  document.getElementById('inp-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('inp-anna').checked=false;
  document.getElementById('bp-section').style.display='none';
  document.getElementById('inp-bp-num').value='';
  document.getElementById('inp-bp-val').value='8';
  calcBP();
}
function clearIncForm(){
  document.getElementById('inc-amount').value='';
  document.getElementById('inc-desc').value='';
  document.getElementById('inc-note').value='';
  document.getElementById('inc-bp-num').value='';
  document.getElementById('inc-bp-val').value='8';
  calcIncBP();
  document.getElementById('inc-date').value=new Date().toISOString().slice(0,10);
}

function populateMonthFilter(){
  var seen={},keys=[];
  expenses.forEach(function(e){var k=monthKey(e.date);if(!seen[k]){seen[k]=1;keys.push(k);}});
  incomes.forEach(function(i){var k=monthKey(i.date);if(!seen[k]){seen[k]=1;keys.push(k);}});
  keys.sort().reverse();
  var sel=document.getElementById('f-month'),cur=sel.value;
  sel.innerHTML='<option value="">Tutti i mesi</option>'+keys.map(function(k){return '<option value="'+k+'">'+monthLabel(k)+'</option>';}).join('');
  if(cur) sel.value=cur;
}

function renderList(){
  var mf=document.getElementById('f-month').value,cf=document.getElementById('f-cat').value;
  var exps=expenses.filter(function(e){return(!mf||monthKey(e.date)===mf)&&(!cf||e.cat===cf);});
  var incs=incomes.filter(function(i){return!mf||monthKey(i.date)===mf;});
  var cont=document.getElementById('list-container'),seen={},allKeys=[];
  exps.forEach(function(e){var k=monthKey(e.date);if(!seen[k]){seen[k]=1;allKeys.push(k);}});
  if(!cf) incs.forEach(function(i){var k=monthKey(i.date);if(!seen[k]){seen[k]=1;allKeys.push(k);}});
  allKeys.sort().reverse();
  if(!allKeys.length){cont.innerHTML='<div class="empty"><i class="ti ti-inbox" style="font-size:32px;display:block;margin-bottom:.5rem"></i>Nessuna voce trovata</div>';return;}
  cont.innerHTML=allKeys.map(function(mk){
    var me=exps.filter(function(e){return monthKey(e.date)===mk;});
    var mi=cf?[]:incs.filter(function(i){return monthKey(i.date)===mk;});
    var totE=me.reduce(function(s,e){return s+e.amount;},0);
    var totI=mi.reduce(function(s,i){return s+i.amount;},0);
    var bal=totI-totE;
    var balHtml=totI>0?'<span style="color:'+(bal>=0?'#085041':'#a32d2d')+';font-weight:500">Saldo: '+(bal>=0?'+':'')+'€ '+fmt(bal)+'</span>':'';
    var incRows=mi.map(function(i){
      var bpHtml=i.bp?'<span style="font-size:11px;color:#0F6E56;margin-left:4px"><i class="ti ti-ticket" style="font-size:11px"></i> '+i.bp.num+'x buoni</span>':'';
      return '<div class="income-row"><span class="exp-date">'+fmtDate(i.date)+'</span><span>'+i.desc+bpHtml+(i.note?'<span style="color:#666;font-size:11px"> — '+i.note+'</span>':'')+'</span><span class="exp-amount" style="color:#085041">+ € '+fmt(i.amount)+'</span><button class="exp-delete btn danger" onclick="deleteIncome('+i.id+')" title="Elimina"><i class="ti ti-trash"></i></button></div>';
    }).join('');
    var expRows=me.map(function(e){
      var bpHtml=e.bp?'<span style="font-size:11px;color:#0F6E56;margin-left:4px"><i class="ti ti-ticket" style="font-size:11px"></i> '+e.bp.num+'x buoni (- € '+fmt(e.bp.total)+')</span>':'';
      var annaHtml=e.anna?'<span class="anna-badge"><i class="ti ti-users" style="font-size:10px"></i> 50%</span>':'';
      var annaDebtHtml=e.annaDebt?'<span class="anna-badge"><i class="ti ti-user" style="font-size:10px"></i> Anna</span>':'';
      return '<div class="expense-row"><span class="exp-date">'+fmtDate(e.date)+'</span><span>'+e.desc+bpHtml+annaHtml+annaDebtHtml+(e.note?'<span style="color:#666;font-size:11px"> — '+e.note+'</span>':'')+'<br><span style="display:inline-block;margin-top:2px;padding:1px 7px;border-radius:5px;font-size:10px;font-weight:500;background:'+(CAT_COLORS[e.cat]||'#888')+'22;color:'+(CAT_COLORS[e.cat]||'#888')+'">'+e.cat+'</span></span><span class="exp-amount" style="color:#a32d2d">- € '+fmt(e.amount)+'</span><button class="exp-delete btn danger" onclick="deleteExpense('+e.id+')" title="Elimina"><i class="ti ti-trash"></i></button></div>';
    }).join('');
    var divider=incRows&&expRows?'<div style="height:0.5px;background:rgba(0,0,0,.1);margin:4px 0"></div>':'';
    return '<div class="month-section"><div class="month-header"><h2>'+monthLabel(mk)+'</h2><div style="display:flex;gap:16px;align-items:center;font-size:13px">'+(totI>0?'<span style="color:#085041">Entrate: + € '+fmt(totI)+'</span>':'')+'<span style="color:#a32d2d">Spese: - € '+fmt(totE)+'</span>'+balHtml+'</div></div><div class="card" style="padding:.5rem 0">'+incRows+divider+expRows+'</div></div>';
  }).join('');
}

function renderSummary(){
  var cont=document.getElementById('summary-container');
  var totAllE=expenses.reduce(function(s,e){return s+e.amount;},0);
  var totAllI=incomes.reduce(function(s,i){return s+i.amount;},0);
  var bal=totAllI-totAllE;
  var byMonth={};
  expenses.forEach(function(e){var k=monthKey(e.date);if(!byMonth[k])byMonth[k]={e:[],i:[]};byMonth[k].e.push(e);});
  incomes.forEach(function(i){var k=monthKey(i.date);if(!byMonth[k])byMonth[k]={e:[],i:[]};byMonth[k].i.push(i);});
  var nM=Math.max(Object.keys(byMonth).length,1);
  var html='<div class="summary-grid"><div class="metric green"><div class="metric-label">Totale entrate</div><div class="metric-value">€ '+fmt(totAllI)+'</div></div><div class="metric red"><div class="metric-label">Totale spese</div><div class="metric-value">€ '+fmt(totAllE)+'</div></div><div class="metric '+(bal>=0?'green':'red')+'"><div class="metric-label">Saldo</div><div class="metric-value">'+(bal>=0?'+':'')+'€ '+fmt(bal)+'</div></div><div class="metric"><div class="metric-label">Media spese/mese</div><div class="metric-value">€ '+fmt(totAllE/nM)+'</div></div></div>';
  if(!Object.keys(byMonth).length){html+='<div class="empty">Nessuna voce registrata</div>';cont.innerHTML=html;return;}
  Object.keys(byMonth).sort().reverse().forEach(function(mk){
    var me=byMonth[mk].e,mi=byMonth[mk].i;
    var totE=me.reduce(function(s,e){return s+e.amount;},0);
    var totI=mi.reduce(function(s,i){return s+i.amount;},0);
    var bMes=totI-totE;
    var byCat={};
    me.forEach(function(e){if(!byCat[e.cat])byCat[e.cat]=[];byCat[e.cat].push(e);});
    var catEntries=Object.keys(byCat).map(function(cat){return{cat:cat,items:byCat[cat]};});
    catEntries.sort(function(a,b){return b.items.reduce(function(s,e){return s+e.amount;},0)-a.items.reduce(function(s,e){return s+e.amount;},0);});
    var catBlocks=catEntries.map(function(entry){
      var cat=entry.cat,items=entry.items;
      var totCat=items.reduce(function(s,e){return s+e.amount;},0);
      var pct=Math.round(totCat/totE*100);
      var totBP=items.reduce(function(s,e){return s+(e.bp?e.bp.total:0);},0);
      var bpNote=totBP>0?'<span style="font-size:11px;color:#0F6E56;margin-left:8px"><i class="ti ti-ticket" style="font-size:11px"></i> Buoni: - € '+fmt(totBP)+'</span>':'';
      var rows=items.map(function(e){
        var bpHtml=e.bp?'<span style="font-size:11px;color:#0F6E56"> <i class="ti ti-ticket" style="font-size:11px"></i> '+e.bp.num+'x buoni (- € '+fmt(e.bp.total)+')</span>':'';
        var annaHtml=e.anna?'<span class="anna-badge"><i class="ti ti-users" style="font-size:10px"></i> 50%</span>':'';
        return '<div class="expense-row"><span class="exp-date">'+fmtDate(e.date)+'</span><span>'+e.desc+bpHtml+annaHtml+(e.note?'<span style="color:#666;font-size:11px"> — '+e.note+'</span>':'')+'</span><span class="exp-amount">€ '+fmt(e.amount)+'</span><button class="exp-delete btn danger" onclick="deleteExpense('+e.id+')" title="Elimina"><i class="ti ti-trash"></i></button></div>';
      }).join('');
      return '<div class="cat-block"><div class="cat-header"><div class="cat-label"><span style="width:10px;height:10px;border-radius:50%;background:'+(CAT_COLORS[cat]||'#888')+';display:inline-block"></span>'+cat+bpNote+'</div><div style="display:flex;align-items:center;gap:12px"><span style="font-size:12px;color:#666">'+pct+'%</span><span style="font-weight:500;font-size:13px">€ '+fmt(totCat)+'</span></div></div><div style="padding:0 4px">'+rows+'</div></div>';
    }).join('');
    var incBlock='';
    if(mi.length){
      var incRows=mi.map(function(i){
        var bpHtml=i.bp?'<span style="font-size:11px;color:#0F6E56"> <i class="ti ti-ticket" style="font-size:11px"></i> '+i.bp.num+'x buoni</span>':'';
        return '<div class="income-row"><span class="exp-date">'+fmtDate(i.date)+'</span><span>'+i.desc+bpHtml+(i.note?'<span style="color:#666;font-size:11px"> — '+i.note+'</span>':'')+'</span><span class="exp-amount" style="color:#085041">+ € '+fmt(i.amount)+'</span><button class="exp-delete btn danger" onclick="deleteIncome('+i.id+')" title="Elimina"><i class="ti ti-trash"></i></button></div>';
      }).join('');
      incBlock='<div class="cat-block"><div class="cat-header" style="background:#E1F5EE"><div class="cat-label" style="color:#085041"><i class="ti ti-arrow-down-circle" style="font-size:14px"></i> Entrate</div><span style="font-weight:500;font-size:13px;color:#085041">+ € '+fmt(totI)+'</span></div><div style="padding:0 4px">'+incRows+'</div></div>';
    }
    var balColor=bMes>=0?'#085041':'#a32d2d';
    html+='<div class="month-section"><div class="month-header"><h2>'+monthLabel(mk)+'</h2><div style="display:flex;gap:16px;font-size:13px;align-items:center">'+(totI>0?'<span style="color:#085041">+ € '+fmt(totI)+'</span>':'')+'<span style="color:#a32d2d">- € '+fmt(totE)+'</span><span style="color:'+balColor+';font-weight:500">Saldo: '+(bMes>=0?'+':'')+'€ '+fmt(bMes)+'</span></div></div><div class="card" style="padding:.75rem">'+incBlock+catBlocks+'</div></div>';
  });
  cont.innerHTML=html;
}

function renderAnna(){
  var debiti=annaItems.filter(function(a){return a.type==='debito';});
  var crediti=annaItems.filter(function(a){return a.type==='credito';});
  var totDeb=debiti.reduce(function(s,a){return s+a.amount;},0);
  var totCre=crediti.reduce(function(s,a){return s+a.amount;},0);
  var saldo=totCre-totDeb;
  document.getElementById('anna-debito').textContent='€ '+fmt(totDeb);
  document.getElementById('anna-credito').textContent='€ '+fmt(totCre);
  document.getElementById('anna-saldo').textContent=(saldo>=0?'+':'')+'€ '+fmt(saldo);
  document.getElementById('anna-saldo').style.color=saldo>=0?'#085041':'#a32d2d';
  var cont=document.getElementById('anna-container');
  if(!annaItems.length){cont.innerHTML='<div class="empty"><i class="ti ti-users" style="font-size:32px;display:block;margin-bottom:.5rem"></i>Nessuna voce registrata</div>';return;}
  var byMonth={};
  annaItems.forEach(function(a){var k=monthKey(a.date);if(!byMonth[k])byMonth[k]=[];byMonth[k].push(a);});
  cont.innerHTML=Object.keys(byMonth).sort().reverse().map(function(mk){
    var items=byMonth[mk];
    var totMDeb=items.filter(function(a){return a.type==='debito';}).reduce(function(s,a){return s+a.amount;},0);
    var totMCre=items.filter(function(a){return a.type==='credito';}).reduce(function(s,a){return s+a.amount;},0);
    var salMes=totMCre-totMDeb;
    var rows=items.map(function(a){
      var isPay=a.type==='pagamento',isD=a.type==='debito';
      var color=isD?'#a32d2d':'#085041',sign=isD?'- ':'+ ';
      var badge=isD?'<span style="font-size:10px;background:#FCEBEB;color:#a32d2d;padding:1px 6px;border-radius:5px;font-weight:500">Debito</span>':(isPay?'<span style="font-size:10px;background:#E1F5EE;color:#085041;padding:1px 6px;border-radius:5px;font-weight:500">Pagamento</span>':'<span style="font-size:10px;background:#E1F5EE;color:#085041;padding:1px 6px;border-radius:5px;font-weight:500">Credito</span>');
      var catBadge=a.cat?'<span style="display:inline-block;margin-left:4px;padding:1px 6px;border-radius:5px;font-size:10px;font-weight:500;background:'+(CAT_COLORS[a.cat]||'#888')+'22;color:'+(CAT_COLORS[a.cat]||'#888')+'">'+a.cat+'</span>':'';
      return '<div class="anna-row"><span class="exp-date">'+fmtDate(a.date)+'</span><span>'+a.desc+catBadge+(a.note?'<span style="color:#666;font-size:11px"> — '+a.note+'</span>':'')+'</span><span>'+badge+'</span><span class="exp-amount" style="color:'+color+'">'+sign+'€ '+fmt(a.amount)+'</span><button class="exp-delete btn danger" onclick="deleteAnna('+a.id+')" title="Elimina"><i class="ti ti-trash"></i></button></div>';
    }).join('');
    var salColor=salMes>=0?'#085041':'#a32d2d';
    return '<div class="month-section"><div class="month-header"><h2>'+monthLabel(mk)+'</h2><span style="font-size:13px;color:'+salColor+';font-weight:500">Saldo: '+(salMes>=0?'+':'')+'€ '+fmt(salMes)+'</span></div><div class="card" style="padding:.5rem 0">'+rows+'</div></div>';
  }).join('');
}

function exportCSV(){
  var mf=document.getElementById('f-month').value,cf=document.getElementById('f-cat').value;
  var exps=expenses.filter(function(e){return(!mf||monthKey(e.date)===mf)&&(!cf||e.cat===cf);});
  var incs=cf?[]:incomes.filter(function(i){return!mf||monthKey(i.date)===mf;});
  if(!exps.length&&!incs.length){toast('Nessun dato da esportare');return;}
  var rows=[['Tipo','Data','Descrizione','Categoria','Importo','Buoni (n)','Val. buono','Sconto buoni','Note']];
  exps.forEach(function(e){rows.push(['Spesa',e.date,e.desc,e.cat,e.amount.toFixed(2),e.bp?e.bp.num:'',e.bp?e.bp.val:'',e.bp?e.bp.total.toFixed(2):'',e.note||'']);});
  incs.forEach(function(i){rows.push(['Entrata',i.date,i.desc,'',i.amount.toFixed(2),'','','',i.note||'']);});
  var csv=rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='spese_export.csv';a.click();
  toast('File CSV scaricato');
}

function showTab(t){
  TABS.forEach(function(id,idx){
    document.getElementById('page-'+id).classList.toggle('visible',id===t);
    document.querySelectorAll('.tab')[idx].classList.toggle('active',id===t);
  });
  if(t==='list'){populateMonthFilter();renderList();}
  if(t==='summary') renderSummary();
  if(t==='anna') renderAnna();
}

function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2500);
}

load();
</script>
