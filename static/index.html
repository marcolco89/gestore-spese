const storage = {
  get: function(key) {
    return fetch('/api/storage/' + encodeURIComponent(key))
      .then(function(r) { return r.ok ? r.json() : null; })
      .catch(function() { return null; });
  },
  set: function(key, value) {
    return fetch('/api/storage/' + encodeURIComponent(key), {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({value: value})
    }).then(function(r) { return r.json(); }).catch(function() { return null; });
  }
};

const fmt = n => Number(n).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});
const mKey = d => { const x=new Date(d); return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0'); };
const mLabel = k => { const p=k.split('-'); return MONTHS[parseInt(p[1])-1]+' '+p[0]; };
const mShort = k => { const p=k.split('-'); return MONTHS[parseInt(p[1])-1].slice(0,3); };
const todayStr = () => new Date().toISOString().slice(0,10);
const fmtDate = d => new Date(d+'T12:00').toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});

function ChartCanvas({config, height=220}) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  const configStr = JSON.stringify(config);
  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    chartRef.current = new Chart(ref.current, JSON.parse(configStr));
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [configStr]);
  return <canvas ref={ref} style={{width:'100%',height:height+'px'}}/>;
}

const KpiCard = ({label,value,color,bg}) => (
  <div style={{background:bg||'#f5f5f0',borderRadius:10,padding:'12px 14px'}}>

    <div style={{fontSize:18,fontWeight:500,color:color||'#1a1a1a'}}>{value}</div>
  </div>
);

function App() {
  const [profile, setProfile] = useState('marco');
  const [tab, setTab] = useState(0);
  const [expenses, setExpenses] = useState([]);
  const [incomes, setIncomes] = useState([]);
  const [partnerItems, setPartnerItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filterMonth, setFilterMonth] = useState('');
  const [filterCat, setFilterCat] = useState('');
  const [activeCats, setActiveCats] = useState([...CATS]);

  const [ef, setEf] = useState({amount:'',date:todayStr(),desc:'',cat:'',note:'',split:false,bpNum:'',bpVal:'8'});
  const [inf, setInf] = useState({amount:'',date:todayStr(),desc:'',note:'',bpNum:'',bpVal:'8'});
  const [pf, setPf] = useState({tipo:'credito',desc:'',amount:'',cat:'',date:todayStr(),note:'',addToStorico:true});
  const [payf, setPayf] = useState({amount:'',desc:''});
  const [toast, setToast] = useState('');
  const [openCats, setOpenCats] = useState({});
  const th = THEME[profile];

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),2500); };

  // ── Carica dati dal backend ───────────────────────────────────────────────
  const loadProfile = async (p) => {
    setLoading(true);
    try {
      const [re, ri, rp] = await Promise.all([
        storage.get('expenses_' + p),
        storage.get('incomes_' + p),
        storage.get('partner_' + p)
      ]);
      let exp = re && re.value ? JSON.parse(re.value) : [];
      let inc = ri && ri.value ? JSON.parse(ri.value) : [];
      let par = rp && rp.value ? JSON.parse(rp.value) : [];

      if (p === 'marco') {
        // Merge precaricati: aggiungi solo quelli mancanti
        const seenE = {}; exp.forEach(e => seenE[e.id] = 1);
        const seenI = {}; inc.forEach(i => seenI[i.id] = 1);
        const seenP = {}; par.forEach(a => seenP[a.id] = 1);
        const newExp = RAW_EXPENSES.filter(e => !seenE[e.id]);
        const newInc = RAW_INCOMES.filter(i => !seenI[i.id]);
        const newPar = RAW_PARTNER.filter(a => !seenP[a.id]);
        if (newExp.length) { exp = [...exp, ...newExp].sort((a,b)=>new Date(b.date)-new Date(a.date)); storage.set('expenses_marco', JSON.stringify(exp)); }
        if (newInc.length) { inc = [...inc, ...newInc].sort((a,b)=>new Date(b.date)-new Date(a.date)); storage.set('incomes_marco', JSON.stringify(inc)); }
        if (newPar.length) { par = [...par, ...newPar].sort((a,b)=>new Date(b.date)-new Date(a.date)); storage.set('partner_marco', JSON.stringify(par)); }
      }
      setExpenses(exp);
      setIncomes(inc);
      setPartnerItems(par);
    } catch(e) {
      setExpenses(p === 'marco' ? [...RAW_EXPENSES] : []);
      setIncomes(p === 'marco' ? [...RAW_INCOMES] : []);
      setPartnerItems(p === 'marco' ? [...RAW_PARTNER] : []);
    }
    setLoading(false);
  };

  useEffect(() => { loadProfile('marco'); }, []);

  // ── Salva sul backend ─────────────────────────────────────────────────────
  const saveExp = (data) => storage.set('expenses_' + profile, JSON.stringify(data));
  const saveInc = (data) => storage.set('incomes_' + profile, JSON.stringify(data));
  const savePar = (data) => storage.set('partner_' + profile, JSON.stringify(data));

  const switchProfile = (p) => {
    setProfile(p);
    setTab(0);
    setFilterMonth(''); setFilterCat('');
    setActiveCats([...CATS]);
    setEf({amount:'',date:todayStr(),desc:'',cat:'',note:'',split:false,bpNum:'',bpVal:p==='anna'?'7.50':'8'});
    setInf({amount:'',date:todayStr(),desc:'',note:'',bpNum:'',bpVal:p==='anna'?'7.50':'8'});
    setPf({tipo:'credito',desc:'',amount:'',cat:'',date:todayStr(),note:'',addToStorico:true});
    setPayf({amount:'',desc:''});
    loadProfile(p);
  };

  const bpDiscount = useMemo(()=>Math.round((parseFloat(ef.bpNum)||0)*(parseFloat(ef.bpVal)||8)*100)/100,[ef.bpNum,ef.bpVal]);
  const incBpTotal = useMemo(()=>Math.round((parseFloat(inf.bpNum)||0)*(parseFloat(inf.bpVal)||8)*100)/100,[inf.bpNum,inf.bpVal]);

  const allMonthKeys = useMemo(()=>{
    const s={}, k=[];
    expenses.forEach(e=>{const m=mKey(e.date);if(!s[m]){s[m]=1;k.push(m);}});
    incomes.forEach(i=>{const m=mKey(i.date);if(!s[m]){s[m]=1;k.push(m);}});
    return k.sort();
  },[expenses,incomes]);

  const monthData = useMemo(()=>allMonthKeys.map(mk=>({
    mk, name:mShort(mk),
    uscite:  Math.round(expenses.filter(e=>mKey(e.date)===mk).reduce((s,e)=>s+e.amount,0)*100)/100,
    entrate: Math.round(incomes.filter(i=>mKey(i.date)===mk).reduce((s,i)=>s+i.amount,0)*100)/100,
  })),[allMonthKeys,expenses,incomes]);

  const avgE = monthData.length ? Math.round(monthData.reduce((s,d)=>s+d.uscite,0)/monthData.length*100)/100 : 0;
  const avgI = monthData.length ? Math.round(monthData.reduce((s,d)=>s+d.entrate,0)/monthData.length*100)/100 : 0;

  const filteredExp = useMemo(()=>expenses.filter(e=>(!filterMonth||mKey(e.date)===filterMonth)&&(!filterCat||e.cat===filterCat)),[expenses,filterMonth,filterCat]);
  const filteredInc = useMemo(()=>incomes.filter(i=>!filterMonth||mKey(i.date)===filterMonth),[incomes,filterMonth]);
  const groupedMonths = useMemo(()=>{
    const s={}, k=[];
    filteredExp.forEach(e=>{const m=mKey(e.date);if(!s[m]){s[m]=1;k.push(m);}});
    if(!filterCat) filteredInc.forEach(i=>{const m=mKey(i.date);if(!s[m]){s[m]=1;k.push(m);}});
    return k.sort().reverse();
  },[filteredExp,filteredInc,filterCat]);

  const partnerSaldo = useMemo(()=>{
    const cred=partnerItems.filter(a=>a.type==='credito').reduce((s,a)=>s+a.amount,0);
    const deb=partnerItems.filter(a=>a.type==='debito').reduce((s,a)=>s+a.amount,0);
    const pag=partnerItems.filter(a=>a.type==='pagamento').reduce((s,a)=>s+(a.signed!==undefined?a.signed:a.amount),0);
    return {cred, deb, saldo:cred-deb-pag};
  },[partnerItems]);

  const payPreview = useMemo(()=>{
    const amt=parseFloat(payf.amount)||0;
    if(!payf.amount) return null;
    const res=partnerSaldo.saldo-amt;
    if(Math.abs(res)<0.01) return {text:'Saldo azzerato ✓',color:'#0F6E56'};
    if(res>0) return {text:'Credito residuo: € '+fmt(res),color:'#0F6E56'};
    return {text:'Debito residuo: € '+fmt(Math.abs(res)),color:'#a32d2d'};
  },[payf.amount,partnerSaldo]);

  /* ── ACTIONS ── */
  const addExpense = () => {
    let amt=parseFloat(ef.amount);
    if(!amt||amt<=0) return showToast('Importo non valido');
    if(!ef.desc.trim()) return showToast('Inserisci la descrizione');
    if(!ef.cat) return showToast('Seleziona una categoria');
    let bp=null;
    if(ef.cat==='Spesa alimentare'&&parseFloat(ef.bpNum)>0){
      const n=parseFloat(ef.bpNum), v=parseFloat(ef.bpVal)||8;
      bp={num:n,val:v,total:Math.round(n*v*100)/100};
      amt=Math.round((amt+bp.total)*100)/100;
    }
    const finalAmt=ef.split?Math.round(amt/2*100)/100:amt;
    const newExp={id:Date.now(),amount:finalAmt,date:ef.date,desc:ef.desc+(ef.split?' (50%)':''),cat:ef.cat,note:ef.note,bp,splitPartner:ef.split};
    const updated=[newExp,...expenses].sort((a,b)=>new Date(b.date)-new Date(a.date));
    setExpenses(updated); saveExp(updated);
    if(ef.split){
      const updP=[{id:Date.now()+1,desc:ef.desc,amount:Math.round(amt/2*100)/100,cat:ef.cat,date:ef.date,type:'credito',note:'50% spesa spartita'},...partnerItems];
      setPartnerItems(updP); savePar(updP);
    }
    setEf({amount:'',date:todayStr(),desc:'',cat:'',note:'',split:false,bpNum:'',bpVal:profile==='anna'?'7.50':'8'});
    showToast('Spesa salvata ✓');
  };

  const addIncome = () => {
    let amt=parseFloat(inf.amount);
    const bpn=parseFloat(inf.bpNum)||0, bpv=parseFloat(inf.bpVal)||8;
    if(bpn>0) amt=Math.round(bpn*bpv*100)/100;
    if(!amt||amt<=0) return showToast('Importo non valido');
    if(!inf.desc.trim()) return showToast('Inserisci la descrizione');
    const bp=bpn>0?{num:bpn,val:bpv,total:Math.round(bpn*bpv*100)/100}:null;
    const updated=[{id:Date.now(),amount:amt,date:inf.date,desc:inf.desc,note:inf.note,bp},...incomes].sort((a,b)=>new Date(b.date)-new Date(a.date));
    setIncomes(updated); saveInc(updated);
    setInf({amount:'',date:todayStr(),desc:'',note:'',bpNum:'',bpVal:profile==='anna'?'7.50':'8'});
    showToast('Entrata salvata ✓');
  };

  const addPartnerItem = () => {
    if(!pf.desc.trim()) return showToast('Inserisci la descrizione');
    const amt=parseFloat(pf.amount);
    if(!amt||amt<=0) return showToast('Importo non valido');
    if(!pf.cat) return showToast('Seleziona una categoria');
    const ts=Date.now();
    const newItem={id:ts+1,desc:pf.desc,amount:amt,cat:pf.cat,date:pf.date,type:pf.tipo,note:pf.tipo==='debito'?'Anna ha anticipato':'Credito da Anna'};
    const updP=[newItem,...partnerItems]; setPartnerItems(updP); savePar(updP);
    if(pf.addToStorico){
      if(pf.tipo==='debito'){
        const updE=[{id:ts,amount:amt,date:pf.date,desc:pf.desc+' (Anna)',cat:pf.cat,note:'Anticipato da Anna',bp:null,splitPartner:false,partnerDebt:true},...expenses].sort((a,b)=>new Date(b.date)-new Date(a.date));
        setExpenses(updE); saveExp(updE);
      } else {
        const updI=[{id:ts,amount:amt,date:pf.date,desc:pf.desc+' (credito da Anna)',note:'Credito da Anna',bp:null},...incomes].sort((a,b)=>new Date(b.date)-new Date(a.date));
        setIncomes(updI); saveInc(updI);
      }
    }
    setPf({tipo:'credito',desc:'',amount:'',cat:'',date:todayStr(),note:'',addToStorico:true});
    showToast((pf.tipo==='debito'?'Debito':'Credito')+' aggiunto ✓');
  };

  const addPayment = () => {
    const amt=parseFloat(payf.amount);
    if(isNaN(amt)||amt===0) return showToast('Importo non valido');
    const now=todayStr();
    const updated=[{id:Date.now(),desc:'Pagamento '+now+(payf.desc?' — '+payf.desc:''),amount:Math.abs(amt),signed:amt,cat:'',date:now,type:'pagamento',note:amt>0?'Anna ha pagato':'Hai pagato Anna'},...partnerItems];
    setPartnerItems(updated); savePar(updated);
    setPayf({amount:'',desc:''});
    showToast('Pagamento registrato ✓');
  };

  const exportCSV = () => {
    const rows=[['Tipo','Data','Descrizione','Categoria','Importo']];
    filteredExp.forEach(e=>rows.push(['Spesa',e.date,e.desc,e.cat,e.amount.toFixed(2)]));
    if(!filterCat) filteredInc.forEach(i=>rows.push(['Entrata',i.date,i.desc,'',i.amount.toFixed(2)]));
    const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
    a.download='spese_'+profile+'.csv'; a.click();
    showToast('CSV scaricato ✓');
  };

  const toggleCat = cat => setActiveCats(p=>p.includes(cat)?(p.length>1?p.filter(c=>c!==cat):p):[...p,cat]);

  /* ── Chart configs ── */

        <div style={S.kpiGrid}>
          <KpiCard label="Totale entrate" value={'€ '+fmt(totI)} color="#085041" bg="#E1F5EE"/>

                    {incOpen&&<div style={{paddingTop:2}}>{mi.map(i=>(<div key={i.id} style={S.irow}><span style={S.dlbl}>{fmtDate(i.date)}</span><span style={{color:'#333'}}>{i.desc}{i.bp&&<span style={{fontSize:10,color:'#0F6E56',marginLeft:6}}>🎟 {i.bp.num}x</span>}</span><span style={{color:'#0F6E56',fontWeight:500}}>+ € {fmt(i.amount)}</span><button style={S.xbtn} onClick={()=>{const u=incomes.filter(x=>x.id!==i.id);setIncomes(u);saveInc(u);showToast('Eliminata');}}>×</button></div>))}</div>}

    const byMonth={};
    partnerItems.forEach(a=>{const k=mKey(a.date);if(!byMonth[k])byMonth[k]=[];byMonth[k].push(a);});
    return (
      <div style={S.page}>
        <div style={S.kpiGrid}>
          <KpiCard label={`Tu devi a ${profile==='marco'?'Anna':'Marco'}`} value={'€ '+fmt(deb)} color="#711B0B" bg="#FCEBEB"/>
          <KpiCard label={`${profile==='marco'?'Anna':'Marco'} ti deve`} value={'€ '+fmt(cred)} color="#085041" bg="#E1F5EE"/>
          <KpiCard label="Saldo netto" value={(saldo>=0?'+':'')+'€ '+fmt(Math.abs(saldo))} color={saldo>=0?'#085041':'#a32d2d'} bg={saldo>=0?'#E1F5EE':'#FCEBEB'}/>
        </div>
        <div style={{...S.card,borderColor:'#E1F5EE',marginBottom:16}}>
          <div style={S.sectionTitle}>↔ Registra pagamento</div>
          <div style={S.grid}>
            <div style={S.fg}>
              <label style={S.lbl}>Importo (€)</label>
              <div style={{fontSize:10,color:'#bbb',marginBottom:4}}>positivo = {profile==='marco'?'Anna':'Marco'} paga te · negativo = tu paghi {profile==='marco'?'Anna':'Marco'}</div>
              <input style={S.inp} type="number" step="0.01" placeholder="es. 25,00 o -10,00" value={payf.amount} onChange={e=>setPayf(p=>({...p,amount:e.target.value}))}/>
            </div>
            <div style={S.fg}>
              <label style={S.lbl}>Saldo dopo pagamento</label>
              <div style={{padding:'9px 11px',background:'#f5f5f0',borderRadius:8,fontSize:14,color:payPreview?.color||'#999',minHeight:40,display:'flex',alignItems:'center'}}>{payPreview?.text||'— inserisci importo'}</div>
            </div>
            <div style={{...S.fg,...S.full}}><label style={S.lbl}>Descrizione (opzionale)</label><input style={S.inp} type="text" placeholder="Es. Bonifico..." value={payf.desc} onChange={e=>setPayf(p=>({...p,desc:e.target.value}))}/></div>
          </div>
          <div style={S.actions}><button style={S.btnS} onClick={addPayment}>Registra pagamento</button></div>
        </div>
        <div style={S.card}>
          <div style={S.sectionTitle}>+ Aggiungi debito / credito</div>
          <div style={S.grid}>
            <div style={{...S.fg,...S.full}}>
              <label style={S.lbl}>Tipo</label>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>setPf(p=>({...p,tipo:'debito'}))} style={{...S.btnO,...(pf.tipo==='debito'?{background:th.accent,color:'#fff',border:'none'}:{}),flex:1,justifyContent:'center'}}>↑ Debito (tu devi)</button>
                <button onClick={()=>setPf(p=>({...p,tipo:'credito'}))} style={{...S.btnO,...(pf.tipo==='credito'?{background:'#0F6E56',color:'#fff',border:'none'}:{}),flex:1,justifyContent:'center'}}>↓ Credito (ti deve)</button>
              </div>
            </div>
            <div style={{...S.fg,...S.full}}><label style={S.lbl}>Descrizione</label><input style={S.inp} type="text" placeholder="Es. Spesa supermercato..." value={pf.desc} onChange={e=>setPf(p=>({...p,desc:e.target.value}))}/></div>
            <div style={S.fg}><label style={S.lbl}>Importo (€)</label><input style={S.inp} type="number" min="0" step="0.01" placeholder="0,00" value={pf.amount} onChange={e=>setPf(p=>({...p,amount:e.target.value}))}/></div>
            <div style={S.fg}><label style={S.lbl}>Data</label><input style={S.inp} type="date" value={pf.date} onChange={e=>setPf(p=>({...p,date:e.target.value}))}/></div>
            <div style={{...S.fg,...S.full}}>
              <label style={S.lbl}>Categoria</label>
              <select style={S.sel} value={pf.cat} onChange={e=>setPf(p=>({...p,cat:e.target.value}))}>
                <option value="">— Seleziona —</option>{CATS.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div style={{...S.fg,...S.full}}>
              <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'#555',background:th.accentLight,padding:'10px 12px',borderRadius:8,cursor:'pointer',userSelect:'none'}}>
                <input type="checkbox" checked={pf.addToStorico} onChange={e=>setPf(p=>({...p,addToStorico:e.target.checked}))} style={{width:15,height:15,accentColor:th.accent}}/>
                Imputare spesa nello storico
              </label>
            </div>
          </div>
          <div style={S.actions}>
            <button style={S.btnO} onClick={()=>setPf({tipo:'credito',desc:'',amount:'',cat:'',date:todayStr(),note:'',addToStorico:true})}>Cancella</button>
            <button style={pf.tipo==='debito'?S.btnP:S.btnS} onClick={addPartnerItem}>{pf.tipo==='debito'?'Aggiungi debito':'Aggiungi credito'}</button>
          </div>
        </div>
        {!Object.keys(byMonth).length
          ? <div style={{textAlign:'center',padding:'3rem',color:'#bbb',fontSize:14}}>Nessuna voce registrata</div>
          : Object.keys(byMonth).sort().reverse().map(mk=>{
            const items=byMonth[mk];
            const mC=items.filter(a=>a.type==='credito').reduce((s,a)=>s+a.amount,0);
            const mD=items.filter(a=>a.type==='debito').reduce((s,a)=>s+a.amount,0);
            const mP=items.filter(a=>a.type==='pagamento').reduce((s,a)=>s+(a.signed!==undefined?a.signed:a.amount),0);
            const sM=mC-mD-mP;
            return (
              <div key={mk} style={{marginBottom:20}}>
                <div style={S.mhdr}>
                  <span style={{fontSize:15,fontWeight:500}}>{mLabel(mk)}</span>
                  <span style={{fontSize:12,fontWeight:500,color:sM>=0?'#0F6E56':'#a32d2d'}}>Saldo: {sM>=0?'+':''}€ {fmt(sM)}</span>
                </div>
                <div style={S.card}>
                  {items.map(a=>{
                    const isPay=a.type==='pagamento', isD=a.type==='debito';
                    const dispAmt=isPay&&a.signed!==undefined?(a.signed<0?'− ':'+ ')+'€ '+fmt(Math.abs(a.signed)):(isD?'− ':'+ ')+'€ '+fmt(a.amount);
                    const dispCol=isPay&&a.signed!==undefined?(a.signed<0?'#a32d2d':'#0F6E56'):(isD?'#a32d2d':'#0F6E56');
                    return (
                      <div key={a.id} style={{display:'grid',gridTemplateColumns:'54px 1fr auto auto 24px',gap:8,alignItems:'center',padding:'8px 10px',fontSize:13,borderBottom:'0.5px solid rgba(0,0,0,.05)'}}>
                        <span style={S.dlbl}>{fmtDate(a.date)}</span>
                        <div><div style={{color:'#333',lineHeight:1.4}}>{a.desc}</div>{a.cat&&<span style={{display:'inline-block',marginTop:2,padding:'1px 7px',borderRadius:4,fontSize:10,fontWeight:500,background:(CAT_COLORS[a.cat]||'#888')+'22',color:CAT_COLORS[a.cat]||'#888'}}>{a.cat}</span>}</div>
                        <span style={{fontSize:10,fontWeight:500,padding:'2px 7px',borderRadius:5,background:isD?'#FCEBEB':'#E1F5EE',color:isD?'#a32d2d':'#085041',whiteSpace:'nowrap'}}>{isD?'Debito':isPay?'Pagamento':'Credito'}</span>
                        <span style={{color:dispCol,fontWeight:500,whiteSpace:'nowrap'}}>{dispAmt}</span>
                        <button style={S.xbtn} onClick={()=>{const u=partnerItems.filter(x=>x.id!==a.id);setPartnerItems(u);savePar(u);showToast('Eliminata');}}>×</button>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })
        }
      </div>
    );
  };

  /* ── TAB 5: ANDAMENTI ── */
  const renderAndamenti = () => {
    const n=monthData.length||1;
    const avgSav=Math.round((monthData.reduce((s,d)=>s+d.entrate,0)-monthData.reduce((s,d)=>s+d.uscite,0))/n*100)/100;
    const bestMk=[...monthData].sort((a,b)=>(b.entrate-b.uscite)-(a.entrate-a.uscite))[0]?.mk||'';
    const worstMk=[...monthData].sort((a,b)=>b.uscite-a.uscite)[0]?.mk||'';
    return (
      <div style={S.page}>
        <div style={S.kpiGrid}>
          <KpiCard label="Media entrate/mese" value={'€ '+fmt(avgI)} color="#085041" bg="#E1F5EE"/>
          <KpiCard label="Media uscite/mese"  value={'€ '+fmt(avgE)} color="#711B0B" bg="#FCEBEB"/>
          <KpiCard label="Risparmio medio" value={(avgSav>=0?'+':'')+'€ '+fmt(avgSav)} color={avgSav>=0?'#085041':'#a32d2d'} bg={avgSav>=0?'#E1F5EE':'#FCEBEB'}/>
          <KpiCard label="Mese migliore"    value={bestMk?mShort(bestMk):'-'} color={th.accent} bg={th.accentLight}/>
          <KpiCard label="Mese più costoso" value={worstMk?mShort(worstMk):'-'} color="#711B0B" bg="#FCEBEB"/>
        </div>
        <div style={S.andCard}>
          <div style={S.andTitle}>Entrate e uscite mensili</div>
          <div style={{position:'relative',height:220}}><ChartCanvas config={globalChartConfig} height={220}/></div>
        </div>
        <div style={S.andCard}>
          <div style={{...S.andTitle,marginBottom:10}}>Andamento per categoria</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
            {CATS.map(cat=>(<button key={cat} onClick={()=>toggleCat(cat)} style={S.chip(activeCats.includes(cat),cat)}>{cat}</button>))}
          </div>
          <div style={{position:'relative',height:280}}><ChartCanvas config={catChartConfig} height={280}/></div>
        </div>
      </div>
    );
  };

  /* ── RENDER ── */
  return (
    <div style={S.wrap}>
      <div style={S.app}>
        <div style={S.hdr}>
          <div style={S.htitle}>
            <svg width={20} height={20} viewBox="0 0 24 24" fill="none" stroke={th.accent} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 12V7H5a2 2 0 010-4h14v4M21 12v5H5a2 2 0 000 4h16v-5M21 12H5"/>
            </svg>
            Gestore spese
            <span style={{fontSize:13,color:'#bbb',fontWeight:400}}>— {profile==='marco'?'Marco':'Anna'}</span>
          </div>
          <div style={S.psw}>
            <button style={S.pbtn(profile==='marco','marco')} onClick={()=>switchProfile('marco')}>Marco</button>
            <button style={S.pbtn(profile==='anna','anna')}  onClick={()=>switchProfile('anna')}>Anna</button>
          </div>
        </div>
        <div style={S.tabbar}>
          {TABS.map((label,i)=>{
            const displayLabel=(i===4)?`Debiti/Crediti ${profile==='marco'?'Anna':'Marco'}`:label;
            return <button key={i} style={S.tab(tab===i)} onClick={()=>setTab(i)}>{displayLabel}</button>;
          })}
        </div>
        {loading
          ? <div style={S.loadingWrap}><span>Caricamento dati...</span></div>
          : <>
            {tab===0 && renderSpesa()}
            {tab===1 && renderEntrata()}
            {tab===2 && renderStorico()}
            {tab===3 && renderRiepilogo()}
            {tab===4 && renderPartner()}
            {tab===5 && renderAndamenti()}
          </>
        }
      </div>
      {toast && <div style={S.toast}>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
