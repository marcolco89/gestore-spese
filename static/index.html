<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestore Spese</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#e8eef7;color:#1a1a1a;font-size:15px;transition:background .3s}
body.anna{background:#faeaf0}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;gap:12px}
.header h1{font-size:20px;font-weight:500;display:flex;align-items:center;gap:8px}
.profile-switch{display:flex;align-items:center;gap:0;background:#e8e8e2;border-radius:10px;padding:3px;transition:background .3s}
body.anna .profile-switch{background:#f5dce8}
.profile-btn{padding:7px 16px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:#666;transition:all .2s;display:flex;align-items:center;gap:5px}
.profile-btn.active-marco{background:#1a3a6e;color:#fff}
.profile-btn.active-anna{background:#a0325a;color:#fff}
.app{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
.tabs{display:flex;gap:2px;margin-bottom:1.5rem;border-bottom:1px solid rgba(0,0,0,.15);overflow-x:auto}
.tab{padding:8px 14px;cursor:pointer;font-size:13px;border:none;background:none;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;display:flex;align-items:center;gap:5px}
.tab.active{font-weight:500}
body:not(.anna) .tab.active{color:#1a3a6e;border-bottom-color:#1a3a6e}
body.anna .tab.active{color:#a0325a;border-bottom-color:#a0325a}
.card{background:#fff;border:0.5px solid rgba(0,0,0,.15);border-radius:12px;padding:1.25rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
label{font-size:11px;color:#666;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
input,select{width:100%;padding:8px 10px;border:0.5px solid rgba(0,0,0,.3);border-radius:8px;font-size:14px;background:#fff;color:#1a1a1a;outline:none}
input:focus,select:focus{box-shadow:0 0 0 3px rgba(0,0,0,.06)}
body:not(.anna) input:focus,body:not(.anna) select:focus{border-color:#1a3a6e}
body.anna input:focus,body.anna select:focus{border-color:#a0325a}
.bp-box{background:#f0f0ea;border-radius:10px;padding:12px;margin-top:4px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;align-items:end}
body.anna .bp-box{background:#fceef4}
.bp-result{font-size:13px;color:#666;padding-bottom:9px}
.bp-result span{font-weight:500;color:#1a1a1a}
.btn{padding:9px 18px;border-radius:8px;border:0.5px solid rgba(0,0,0,.3);background:transparent;color:#1a1a1a;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:#f0f0ea}
body.anna .btn:hover{background:#fceef4}
.btn.primary{border-color:transparent;color:#fff}
body:not(.anna) .btn.primary{background:#1a3a6e}
body:not(.anna) .btn.primary:hover{background:#142e58}
body.anna .btn.primary{background:#a0325a}
body.anna .btn.primary:hover{background:#8a2a4e}
.btn.success{background:#0F6E56;color:#fff;border-color:transparent}
.btn.success:hover{opacity:.85}
.btn.partner{color:#fff;border-color:transparent}
body:not(.anna) .btn.partner{background:#1a3a6e}
body:not(.anna) .btn.partner:hover{background:#142e58}
body.anna .btn.partner{background:#a0325a}
body.anna .btn.partner:hover{background:#8a2a4e}
.btn.danger{color:#a32d2d;border-color:transparent}
.btn.danger:hover{background:#fcebeb}
.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem}
.month-section{margin-bottom:1.5rem}
.month-header{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.15);margin-bottom:.75rem}
.month-header h2{font-size:16px;font-weight:500}
.cat-block{margin-bottom:.75rem}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#f0f0ea;border-radius:8px;margin-bottom:4px;font-size:13px;font-weight:500}
body.anna .cat-header{background:#fceef4}
.cat-label{display:flex;align-items:center;gap:6px}
.expense-row{display:grid;grid-template-columns:72px 1fr auto auto;gap:8px;align-items:center;padding:6px 10px;font-size:13px;border-bottom:0.5px solid rgba(0,0,0,.1)}
.expense-row:last-child{border-bottom:none}
.income-row{display:grid;grid-template-columns:72px 1fr auto auto;gap:8px;align-items:center;padding:6px 10px;font-size:13px;border-bottom:0.5px solid rgba(0,0,0,.1)}
.income-row:last-child{border-bottom:none}
.anna-row{display:grid;grid-template-columns:90px 1fr 100px auto auto;gap:8px;align-items:center;padding:8px 10px;font-size:13px;border-bottom:0.5px solid rgba(0,0,0,.1)}
.anna-row:last-child{border-bottom:none}
.exp-date{color:#666;font-size:12px}
.exp-amount{font-weight:500;white-space:nowrap}
.exp-delete{opacity:0;transition:opacity .15s;cursor:pointer;background:none;border:none;color:#a32d2d;font-size:16px;padding:2px 4px}
.expense-row:hover .exp-delete,.income-row:hover .exp-delete,.anna-row:hover .exp-delete{opacity:1}
.empty{text-align:center;padding:3rem 1rem;color:#666;font-size:14px}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem}
.metric{background:#f0f0ea;border-radius:8px;padding:12px}
body.anna .metric{background:#fceef4}
.metric-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.metric-value{font-size:20px;font-weight:500}
.metric.green{background:#E1F5EE}
.metric.green .metric-label{color:#0F6E56}
.metric.green .metric-value{color:#085041}
.metric.red{background:#FCEBEB}
.metric.red .metric-label{color:#993C1D}
.metric.red .metric-value{color:#711B0B}
.metric.accent{border-radius:8px;padding:12px}
body:not(.anna) .metric.accent{background:#dde8f5}
body:not(.anna) .metric.accent .metric-label{color:#1a3a6e}
body:not(.anna) .metric.accent .metric-value{color:#1a3a6e}
body.anna .metric.accent{background:#f9dcea}
body.anna .metric.accent .metric-label{color:#a0325a}
body.anna .metric.accent .metric-value{color:#a0325a}
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-bar select{max-width:160px;padding:6px 10px;font-size:13px}
.flag-partner{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f0f0ea;border-radius:8px;cursor:pointer;user-select:none;font-size:13px}
body.anna .flag-partner{background:#fceef4}
.flag-partner input[type=checkbox]{width:16px;height:16px;cursor:pointer}
body:not(.anna) .flag-partner input{accent-color:#1a3a6e}
body.anna .flag-partner input{accent-color:#a0325a}
.partner-saldo-box{border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;background:#fff;border:0.5px solid rgba(0,0,0,.15)}
.partner-saldo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
#page-add,#page-income,#page-list,#page-summary,#page-partner{display:none}
#page-add.visible,#page-income.visible,#page-list.visible,#page-summary.visible,#page-partner.visible{display:block}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
body:not(.anna) .toast{background:#1a3a6e}
body.anna .toast{background:#a0325a}
.toast.show{opacity:1}
.partner-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:5px;font-size:10px;font-weight:500;margin-left:4px}
body:not(.anna) .partner-badge{background:#dde8f5;color:#1a3a6e}
body.anna .partner-badge{background:#f9dcea;color:#a0325a}
.pay-section{border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;border:0.5px solid #E1F5EE;background:#fff}
.loading-bar{position:fixed;top:0;left:0;height:2px;background:#1a3a6e;width:0;transition:width .3s;z-index:999}
body.anna .loading-bar{background:#a0325a}
</style>
</head>
<body>
<div class="loading-bar" id="loading-bar"></div>
<div class="app">
  <div class="header">
    <h1 id="app-title"><i class="ti ti-wallet"></i> Gestore Spese</h1>
    <div class="profile-switch">
      <button class="profile-btn active-marco" id="btn-marco" onclick="switchProfile('marco')"><i class="ti ti-user"></i> Marco</button>
      <button class="profile-btn" id="btn-anna" onclick="switchProfile('anna')"><i class="ti ti-user"></i> Anna</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('add')"><i class="ti ti-minus"></i> Nuova spesa</button>
    <button class="tab" onclick="showTab('income')"><i class="ti ti-plus"></i> Nuova entrata</button>
    <button class="tab" onclick="showTab('list')"><i class="ti ti-list"></i> Storico</button>
    <button class="tab" onclick="showTab('summary')"><i class="ti ti-chart-bar"></i> Riepilogo</button>
    <button class="tab" id="tab-partner" onclick="showTab('partner')"><i class="ti ti-users"></i> <span id="partner-tab-label">Debiti/Crediti Anna</span></button>
  </div>

  <div id="page-add" class="visible">
    <div class="card">
      <div class="form-grid">
        <div class="form-group"><label>Importo (€)</label><input type="number" id="inp-amount" min="0" step="0.01" placeholder="0,00"></div>
        <div class="form-group"><label>Data</label><input type="date" id="inp-date"></div>
        <div class="form-group full"><label>Descrizione</label><input type="text" id="inp-desc" placeholder="Es. Visita medica, Carburante..."></div>
        <div class="form-group full">
          <label>Categoria</label>
          <select id="inp-cat" onchange="toggleBP()">
            <option value="">— Seleziona categoria —</option>
            <option>Utenze</option><option>Spese Mediche</option><option>Viaggi</option>
            <option>Auto</option><option>Casa</option><option>Pasti fuori</option>
            <option>Spesa alimentare</option><option>Shopping</option><option>Svago</option>
            <option>Cane</option><option>Regali</option><option>Alice</option><option>Mutuo</option>
          </select>
        </div>
        <div class="form-group full" id="bp-section" style="display:none">
          <label>Buoni pasto</label>
          <div class="bp-box">
            <div class="form-group"><label>N° buoni</label><input type="number" id="inp-bp-num" min="0" step="1" placeholder="0" oninput="calcBP()"></div>
            <div class="form-group"><label>Valore buono (€)</label><input type="number" id="inp-bp-val" min="0" step="0.01" value="8" oninput="calcBP()"></div>
            <div class="bp-result" id="bp-result">Sconto: <span>€ 0,00</span></div>
          </div>
        </div>
        <div class="form-group full">
          <label class="flag-partner"><input type="checkbox" id="inp-partner"><span id="split-flag-text">Da spartire con Anna</span></label>
        </div>
        <div class="form-group full"><label>Note (opzionale)</label><input type="text" id="inp-note" placeholder="Informazioni aggiuntive..."></div>
      </div>
      <div class="actions">
        <button class="btn" onclick="clearExpForm()"><i class="ti ti-refresh"></i> Cancella</button>
        <button class="btn primary" onclick="addExpense()"><i class="ti ti-check"></i> Salva spesa</button>
      </div>
    </div>
  </div>

  <div id="page-income">
    <div class="card">
      <div class="form-grid">
        <div class="form-group"><label>Importo (€)</label><input type="number" id="inc-amount" min="0" step="0.01" placeholder="0,00"></div>
        <div class="form-group"><label>Data</label><input type="date" id="inc-date"></div>
        <div class="form-group full"><label>Descrizione</label><input type="text" id="inc-desc" placeholder="Es. Stipendio, Rimborso..."></div>
        <div class="form-group full">
          <label>Buoni pasto (opzionale)</label>
          <div class="bp-box">
            <div class="form-group"><label>N° buoni</label><input type="number" id="inc-bp-num" min="0" step="1" placeholder="0" oninput="calcIncBP()"></div>
            <div class="form-group"><label>Valore buono (€)</label><input type="number" id="inc-bp-val" min="0" step="0.01" value="8" oninput="calcIncBP()"></div>
            <div class="bp-result" id="inc-bp-result">Totale: <span>€ 0,00</span></div>
          </div>
        </div>
        <div class="form-group full"><label>Note (opzionale)</label><input type="text" id="inc-note" placeholder="Informazioni aggiuntive..."></div>
      </div>
      <div class="actions">
        <button class="btn" onclick="clearIncForm()"><i class="ti ti-refresh"></i> Cancella</button>
        <button class="btn success" onclick="addIncome()"><i class="ti ti-check"></i> Salva entrata</button>
      </div>
    </div>
  </div>

  <div id="page-list">
    <div class="filter-bar">
      <select id="f-month" onchange="renderList()"><option value="">Tutti i mesi</option></select>
      <select id="f-cat" onchange="renderList()">
        <option value="">Tutte le categorie</option>
        <option>Utenze</option><option>Spese Mediche</option><option>Viaggi</option>
        <option>Auto</option><option>Casa</option><option>Pasti fuori</option>
        <option>Spesa alimentare</option><option>Shopping</option><option>Svago</option>
        <option>Cane</option><option>Regali</option><option>Alice</option><option>Mutuo</option>
      </select>
      <div style="flex:1"></div>
      <button class="btn" onclick="exportCSV()"><i class="ti ti-download"></i> Esporta CSV</button>
    </div>
    <div id="list-container"></div>
  </div>

  <div id="page-summary"><div id="summary-container"></div></div>

  <div id="page-partner">
    <div class="partner-saldo-box">
      <div class="partner-saldo-grid">
        <div class="metric red"><div class="metric-label">Tu devi a <span id="p-label-devi">Anna</span></div><div class="metric-value" id="p-debito">€ 0,00</div></div>
        <div class="metric green"><div class="metric-label"><span id="p-label-deve">Anna</span> ti deve</div><div class="metric-value" id="p-credito">€ 0,00</div></div>
        <div class="metric accent"><div class="metric-label">Saldo netto</div><div class="metric-value" id="p-saldo">€ 0,00</div></div>
      </div>
    </div>
    <div class="pay-section">
      <div style="font-size:13px;font-weight:500;color:#0F6E56;margin-bottom:12px;display:flex;align-items:center;gap:6px"><i class="ti ti-cash"></i> Registra pagamento di <span id="p-pay-label">Anna</span></div>
      <div class="form-grid">
        <div class="form-group"><label>Importo pagato (€)</label><input type="number" id="p-pay-amount" min="0" step="0.01" placeholder="0,00" oninput="calcPartnerPay()"></div>
        <div class="form-group"><label>Saldo residuo dopo pagamento</label><div id="p-pay-preview" style="padding:9px 10px;background:#f0f0ea;border-radius:8px;font-size:14px;color:#666">— inserisci importo</div></div>
      </div>
      <div class="actions"><button class="btn success" onclick="addPartnerPay()"><i class="ti ti-check"></i> Registra pagamento</button></div>
    </div>
    <div class="card" style="margin-bottom:1.5rem">
      <div style="font-size:13px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:6px" id="p-debt-title"><i class="ti ti-user-plus"></i> Aggiungi debito verso Anna</div>
      <div class="form-grid">
        <div class="form-group full"><label>Descrizione</label><input type="text" id="p-desc" placeholder="Es. Spesa supermercato..."></div>
        <div class="form-group"><label>Importo (€)</label><input type="number" id="p-amount" min="0" step="0.01" placeholder="0,00"></div>
        <div class="form-group">
          <label>Mese</label>
          <select id="p-month">
            <option value="2026-01">Gennaio 2026</option><option value="2026-02">Febbraio 2026</option>
            <option value="2026-03">Marzo 2026</option><option value="2026-04">Aprile 2026</option>
            <option value="2026-05">Maggio 2026</option><option value="2026-06" selected>Giugno 2026</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Categoria</label>
          <select id="p-cat">
            <option value="">— Seleziona categoria —</option>
            <option>Utenze</option><option>Spese Mediche</option><option>Viaggi</option>
            <option>Auto</option><option>Casa</option><option>Pasti fuori</option>
            <option>Spesa alimentare</option><option>Shopping</option><option>Svago</option>
            <option>Cane</option><option>Regali</option><option>Alice</option><option>Mutuo</option>
          </select>
        </div>
      </div>
      <div class="actions"><button class="btn partner" onclick="addPartnerDebt()"><i class="ti ti-user-plus"></i> <span id="p-btn-add">Aggiungi debito verso Anna</span></button></div>
    </div>
    <div id="partner-container"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

// ── Storage API → backend ────────────────────────────────────────────────────
var storage={
  get:function(key){
    return fetch('/api/storage/'+encodeURIComponent(key))
      .then(function(r){return r.ok?r.json():null;})
      .catch(function(){return null;});
  },
  set:function(key,value){
    return fetch('/api/storage/'+encodeURIComponent(key),{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({value:value})
    }).then(function(r){return r.json();}).catch(function(){return null;});
  }
};

function loading(show){
  var b=document.getElementById('loading-bar');

}

function fmt(n){return Number(n).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});}
function monthKey(date){var d=new Date(date);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function monthLabel(key){var p=key.split('-');return MONTHS[parseInt(p[1])-1]+' '+p[0];}
function fmtDate(date){return new Date(date+'T12:00').toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});}
function partnerName(){return currentProfile==='marco'?'Anna':'Marco';}
function expKey(){return 'expenses_'+currentProfile;}
function incKey(){return 'incomes_'+currentProfile;}
function prtKey(){return 'partner_'+currentProfile;}

function saveExp(){storage.set(expKey(),JSON.stringify(expenses));}
function saveInc(){storage.set(incKey(),JSON.stringify(incomes));}
function savePartner(){storage.set(prtKey(),JSON.stringify(partnerItems));}

function switchProfile(p){
  currentProfile=p;
  document.body.classList.toggle('anna',p==='anna');
  document.getElementById('btn-marco').className='profile-btn'+(p==='marco'?' active-marco':'');
  document.getElementById('btn-anna').className='profile-btn'+(p==='anna'?' active-anna':'');
  var pn=partnerName();
  document.getElementById('partner-tab-label').textContent='Debiti/Crediti '+pn;
  document.getElementById('p-label-devi').textContent=pn;
  document.getElementById('p-label-deve').textContent=pn;
  document.getElementById('p-pay-label').textContent=pn;
  document.getElementById('p-debt-title').innerHTML='<i class="ti ti-user-plus"></i> Aggiungi debito verso '+pn;
  document.getElementById('p-btn-add').textContent='Aggiungi debito verso '+pn;
  document.getElementById('split-flag-text').textContent='Da spartire con '+pn;
  document.getElementById('app-title').innerHTML='<i class="ti ti-wallet"></i> Gestore Spese — '+(p==='marco'?'Marco':'Anna');
  expenses=[];incomes=[];partnerItems=[];
  loadProfile();
  showTab('add');
}

function loadProfile(){
  var today=new Date().toISOString().slice(0,10);
  document.getElementById('inp-date').value=today;
  document.getElementById('inc-date').value=today;
  loading(true);
  Promise.all([
    storage.get(expKey()),
    storage.get(incKey()),
    storage.get(prtKey())
  ]).then(function(res){
    var re=res[0],ri=res[1],rp=res[2];
    if(re&&re.value){try{expenses=JSON.parse(re.value);}catch(e){expenses=[];}}
    if(ri&&ri.value){try{incomes=JSON.parse(ri.value);}catch(e){incomes=[];}}
    if(rp&&rp.value){try{partnerItems=JSON.parse(rp.value);}catch(e){partnerItems=[];}}
    if(currentProfile==='marco'){loadPreloadedMarco();loadPreloadedIncomesMarco();}
    else{populateMonthFilter();}
    loading(false);
  }).catch(function(){
    if(currentProfile==='marco'){loadPreloadedMarco();loadPreloadedIncomesMarco();}
    else{populateMonthFilter();}
    loading(false);
  });
}

function loadPreloadedMarco(){
  var seen={};expenses.forEach(function(e){seen[e.id]=1;});
  var added=0;
  PRELOADED_MARCO.forEach(function(e){if(!seen[e.id]){expenses.push(e);added++;}});
  if(added>0){expenses.sort(function(a,b){return new Date(b.date)-new Date(a.date);});saveExp();}
  populateMonthFilter();
}
function loadPreloadedIncomesMarco(){
  var seen={};incomes.forEach(function(i){seen[i.id]=1;});
  var added=0;
  PRELOADED_INCOMES_MARCO.forEach(function(i){if(!seen[i.id]){incomes.push(i);added++;}});
  if(added>0){incomes.sort(function(a,b){return new Date(b.date)-new Date(a.date);});saveInc();}
}

function toggleBP(){
  var show=document.getElementById('inp-cat').value==='Spesa alimentare';
  document.getElementById('bp-section').style.display=show?'block':'none';
  if(!show){document.getElementById('inp-bp-num').value='';calcBP();}
}
function calcBP(){
  var n=parseFloat(document.getElementById('inp-bp-num').value)||0;
  var v=parseFloat(document.getElementById('inp-bp-val').value)||8;
  document.getElementById('bp-result').innerHTML='Sconto: <span>€ '+fmt(n*v)+'</span>';
}
function calcIncBP(){
  var n=parseFloat(document.getElementById('inc-bp-num').value)||0;
  var v=parseFloat(document.getElementById('inc-bp-val').value)||8;
  var total=n*v;
  document.getElementById('inc-bp-result').innerHTML='Totale: <span>€ '+fmt(total)+'</span>';
  if(n>0){
    document.getElementById('inc-amount').value=total.toFixed(2);
    var date=document.getElementById('inc-date').value;
    if(date){var d=new Date(date+'T12:00');document.getElementById('inc-desc').value='Buoni pasto '+MONTHS[d.getMonth()];}
  }
}

function addExpense(){
  var amount=parseFloat(document.getElementById('inp-amount').value);
  var date=document.getElementById('inp-date').value;
  var desc=document.getElementById('inp-desc').value.trim();
  var cat=document.getElementById('inp-cat').value;
  var note=document.getElementById('inp-note').value.trim();
  var splitPartner=document.getElementById('inp-partner').checked;
  if(!amount||amount<=0){toast('Inserisci un importo valido');return;}
  if(!date){toast('Inserisci la data');return;}
  if(!desc){toast('Inserisci la descrizione');return;}
  if(!cat){toast('Seleziona una categoria');return;}
  var bp=null;
  if(cat==='Spesa alimentare'){
    var bpn=parseFloat(document.getElementById('inp-bp-num').value)||0;
    var bpv=parseFloat(document.getElementById('inp-bp-val').value)||8;
    if(bpn>0){
      bp={num:bpn,val:bpv,total:bpn*bpv};
      amount=Math.round((amount+bp.total)*100)/100;
    }
  }
  var expAmount=splitPartner?Math.round(amount/2*100)/100:amount;
  expenses.push({id:Date.now(),amount:expAmount,date:date,desc:desc+(splitPartner?' (50%)':''),cat:cat,note:note,bp:bp,splitPartner:splitPartner});
  expenses.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  if(splitPartner){
    var half=Math.round(amount/2*100)/100;
    partnerItems.push({id:Date.now()+1,desc:desc,amount:half,cat:cat,date:date,type:'credito',expId:null,note:'50% spesa spartita'});
    partnerItems.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
    savePartner();
  }
  saveExp();populateMonthFilter();clearExpForm();
  toast(splitPartner?'Spesa salvata: metà come credito verso '+partnerName()+' ✓':'Spesa salvata ✓');
}

function addIncome(){
  var amount=parseFloat(document.getElementById('inc-amount').value);
  var date=document.getElementById('inc-date').value;
  var desc=document.getElementById('inc-desc').value.trim();
  var note=document.getElementById('inc-note').value.trim();
  var bpn=parseFloat(document.getElementById('inc-bp-num').value)||0;
  var bpv=parseFloat(document.getElementById('inc-bp-val').value)||8;
  if(bpn>0) amount=Math.round(bpn*bpv*100)/100;
  if(!amount||amount<=0){toast('Inserisci un importo valido');return;}
  if(!date){toast('Inserisci la data');return;}
  if(!desc){toast('Inserisci la descrizione');return;}
  var bp=bpn>0?{num:bpn,val:bpv,total:bpn*bpv}:null;
  incomes.push({id:Date.now(),amount:amount,date:date,desc:desc,note:note,bp:bp});
  incomes.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  saveInc();populateMonthFilter();clearIncForm();
  toast('Entrata salvata ✓');
}

function calcPartnerPay(){
  var amount=parseFloat(document.getElementById('p-pay-amount').value)||0;
  var crediti=partnerItems.filter(function(a){return a.type==='credito';}).reduce(function(s,a){return s+a.amount;},0);
  var debiti=partnerItems.filter(function(a){return a.type==='debito';}).reduce(function(s,a){return s+a.amount;},0);
  var pagamenti=partnerItems.filter(function(a){return a.type==='pagamento';}).reduce(function(s,a){return s+a.amount;},0);
  var saldoAttuale=crediti-debiti-pagamenti;
  var prev=document.getElementById('p-pay-preview');
  if(!amount){prev.textContent='— inserisci importo';prev.style.color='#666';return;}
  var residuo=saldoAttuale-amount;
  if(Math.abs(residuo)<0.01){prev.textContent='Saldo azzerato ✓';prev.style.color='#085041';}
  else if(residuo>0){prev.textContent='Credito residuo: € '+fmt(residuo);prev.style.color='#085041';}
  else{prev.textContent='Pagamento in eccesso: € '+fmt(Math.abs(residuo));prev.style.color='#a32d2d';}
}
function addPartnerPay(){
  var amount=parseFloat(document.getElementById('p-pay-amount').value);
  if(!amount||amount<=0){toast('Inserisci un importo valido');return;}
  var now=new Date();
  var dd=String(now.getDate()).padStart(2,'0');
  var mm=String(now.getMonth()+1).padStart(2,'0');
  partnerItems.push({id:Date.now(),desc:'Pagamento alla data '+dd+'.'+mm+'.'+now.getFullYear(),amount:amount,cat:'',date:now.toISOString().slice(0,10),type:'pagamento',expId:null,note:''});
  partnerItems.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  savePartner();
  document.getElementById('p-pay-amount').value='';
  document.getElementById('p-pay-preview').textContent='— inserisci importo';
  document.getElementById('p-pay-preview').style.color='#666';
  renderPartner();toast('Pagamento registrato ✓');
}

function addPartnerDebt(){
  var desc=document.getElementById('p-desc').value.trim();
  var amount=parseFloat(document.getElementById('p-amount').value);
  var month=document.getElementById('p-month').value;
  var cat=document.getElementById('p-cat').value;
  if(!desc){toast('Inserisci la descrizione');return;}
  if(!amount||amount<=0){toast('Inserisci un importo valido');return;}
  if(!cat){toast('Seleziona una categoria');return;}
  var date=month+'-01';
  var expId=Date.now();
  expenses.push({id:expId,amount:amount,date:date,desc:desc+' ('+partnerName()+')',cat:cat,note:'Anticipato da '+partnerName(),bp:null,splitPartner:false,partnerDebt:true});
  expenses.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  saveExp();
  partnerItems.push({id:Date.now()+1,desc:desc,amount:amount,cat:cat,date:date,type:'debito',expId:expId,note:partnerName()+' ha anticipato'});
  partnerItems.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  savePartner();
  document.getElementById('p-desc').value='';
  document.getElementById('p-amount').value='';
  document.getElementById('p-cat').value='';
  populateMonthFilter();renderPartner();
  toast('Debito verso '+partnerName()+' aggiunto ✓');
}

function deleteExpense(id){
  var exp=expenses.filter(function(e){return e.id===id;})[0];
  expenses=expenses.filter(function(e){return e.id!==id;});
  saveExp();
  if(exp){
    var before=partnerItems.length;
    if(exp.partnerDebt) partnerItems=partnerItems.filter(function(a){return a.expId!==id;});
    if(exp.splitPartner) partnerItems=partnerItems.filter(function(a){return!(a.type==='credito'&&a.desc===exp.desc.replace(' (50%)','')&&monthKey(a.date)===monthKey(exp.date));});
    if(partnerItems.length!==before) savePartner();
  }
  renderList();renderSummary();toast('Spesa eliminata');
}
function deleteIncome(id){
  incomes=incomes.filter(function(i){return i.id!==id;});
  saveInc();renderList();renderSummary();toast('Entrata eliminata');
}
function deletePartner(id){
  var item=partnerItems.filter(function(a){return a.id===id;})[0];
  partnerItems=partnerItems.filter(function(a){return a.id!==id;});
  if(item&&item.expId){expenses=expenses.filter(function(e){return e.id!==item.expId;});saveExp();}
  savePartner();renderPartner();renderList();toast('Voce eliminata');
}

function clearExpForm(){
  ['inp-amount','inp-desc','inp-note'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('inp-cat').value='';
  document.getElementById('inp-date').value=new Date().toISOString().slice(0,10);
  document.getElementById('inp-partner').checked=false;
  document.getElementById('bp-section').style.display='none';
  document.getElementById('inp-bp-num').value='';
  document.getElementById('inp-bp-val').value='8';
  calcBP();
}
function clearIncForm(){
  ['inc-amount','inc-desc','inc-note'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('inc-bp-num').value='';
  document.getElementById('inc-bp-val').value='8';
  calcIncBP();
  document.getElementById('inc-date').value=new Date().toISOString().slice(0,10);
}

function populateMonthFilter(){
  var seen={},keys=[];
  expenses.forEach(function(e){var k=monthKey(e.date);if(!seen[k]){seen[k]=1;keys.push(k);}});
  incomes.forEach(function(i){var k=monthKey(i.date);if(!seen[k]){seen[k]=1;keys.push(k);}});
  keys.sort().reverse();
  var sel=document.getElementById('f-month'),cur=sel.value;
  sel.innerHTML='<option value="">Tutti i mesi</option>'+keys.map(function(k){return '<option value="'+k+'">'+monthLabel(k)+'</option>';}).join('');
  if(cur) sel.value=cur;
}

function renderList(){
  var mf=document.getElementById('f-month').value,cf=document.getElementById('f-cat').value;
  var exps=expenses.filter(function(e){return(!mf||monthKey(e.date)===mf)&&(!cf||e.cat===cf);});
  var incs=incomes.filter(function(i){return!mf||monthKey(i.date)===mf;});
  var cont=document.getElementById('list-container'),seen={},allKeys=[];
  exps.forEach(function(e){var k=monthKey(e.date);if(!seen[k]){seen[k]=1;allKeys.push(k);}});
  if(!cf) incs.forEach(function(i){var k=monthKey(i.date);if(!seen[k]){seen[k]=1;allKeys.push(k);}});
  allKeys.sort().reverse();
  if(!allKeys.length){cont.innerHTML='<div class="empty"><i class="ti ti-inbox" style="font-size:32px;display:block;margin-bottom:.5rem"></i>Nessuna voce trovata</div>';return;}
  cont.innerHTML=allKeys.map(function(mk){
    var me=exps.filter(function(e){return monthKey(e.date)===mk;});
    var mi=cf?[]:incs.filter(function(i){return monthKey(i.date)===mk;});
    var totE=me.reduce(function(s,e){return s+e.amount;},0);
    var totI=mi.reduce(function(s,i){return s+i.amount;},0);
    var bal=totI-totE;
    var balHtml=totI>0?'<span style="color:'+(bal>=0?'#085041':'#a32d2d')+';font-weight:500">Saldo: '+(bal>=0?'+':'')+'€ '+fmt(bal)+'</span>':'';
    var incRows=mi.map(function(i){
      var bpH=i.bp?'<span style="font-size:11px;color:#0F6E56;margin-left:4px"><i class="ti ti-ticket" style="font-size:11px"></i> '+i.bp.num+'x buoni</span>':'';
      return '<div class="income-row"><span class="exp-date">'+fmtDate(i.date)+'</span><span>'+i.desc+bpH+(i.note?'<span style="color:#666;font-size:11px"> — '+i.note+'</span>':'')+'</span><span class="exp-amount" style="color:#085041">+ € '+fmt(i.amount)+'</span><button class="exp-delete btn danger" onclick="deleteIncome('+i.id+')"><i class="ti ti-trash"></i></button></div>';
    }).join('');
    var expRows=me.map(function(e){
      var bpH=e.bp?'<span style="font-size:11px;color:#0F6E56;margin-left:4px"><i class="ti ti-ticket" style="font-size:11px"></i> '+e.bp.num+'x (- € '+fmt(e.bp.total)+')</span>':'';
      var spH=e.splitPartner?'<span class="partner-badge"><i class="ti ti-users" style="font-size:10px"></i> 50%</span>':'';
      var pdH=e.partnerDebt?'<span class="partner-badge"><i class="ti ti-user" style="font-size:10px"></i> '+partnerName()+'</span>':'';
      return '<div class="expense-row"><span class="exp-date">'+fmtDate(e.date)+'</span><span>'+e.desc+bpH+spH+pdH+(e.note?'<span style="color:#666;font-size:11px"> — '+e.note+'</span>':'')+'<br><span style="display:inline-block;margin-top:2px;padding:1px 7px;border-radius:5px;font-size:10px;font-weight:500;background:'+(CAT_COLORS[e.cat]||'#888')+'22;color:'+(CAT_COLORS[e.cat]||'#888')+'">'+e.cat+'</span></span><span class="exp-amount" style="color:#a32d2d">- € '+fmt(e.amount)+'</span><button class="exp-delete btn danger" onclick="deleteExpense('+e.id+')"><i class="ti ti-trash"></i></button></div>';
    }).join('');
    var div=incRows&&expRows?'<div style="height:0.5px;background:rgba(0,0,0,.1);margin:4px 0"></div>':'';
    return '<div class="month-section"><div class="month-header"><h2>'+monthLabel(mk)+'</h2><div style="display:flex;gap:16px;align-items:center;font-size:13px">'+(totI>0?'<span style="color:#085041">+ € '+fmt(totI)+'</span>':'')+'<span style="color:#a32d2d">- € '+fmt(totE)+'</span>'+balHtml+'</div></div><div class="card" style="padding:.5rem 0">'+incRows+div+expRows+'</div></div>';
  }).join('');
}

function renderSummary(){
  var cont=document.getElementById('summary-container');
  var totE=expenses.reduce(function(s,e){return s+e.amount;},0);
  var totI=incomes.reduce(function(s,i){return s+i.amount;},0);
  var bal=totI-totE;
  var byMonth={};
  expenses.forEach(function(e){var k=monthKey(e.date);if(!byMonth[k])byMonth[k]={e:[],i:[]};byMonth[k].e.push(e);});
  incomes.forEach(function(i){var k=monthKey(i.date);if(!byMonth[k])byMonth[k]={e:[],i:[]};byMonth[k].i.push(i);});
  var nM=Math.max(Object.keys(byMonth).length,1);
  var html='<div class="summary-grid"><div class="metric green"><div class="metric-label">Totale entrate</div><div class="metric-value">€ '+fmt(totI)+'</div></div><div class="metric red"><div class="metric-label">Totale spese</div><div class="metric-value">€ '+fmt(totE)+'</div></div><div class="metric '+(bal>=0?'green':'red')+'"><div class="metric-label">Saldo</div><div class="metric-value">'+(bal>=0?'+':'')+'€ '+fmt(bal)+'</div></div><div class="metric"><div class="metric-label">Media spese/mese</div><div class="metric-value">€ '+fmt(totE/nM)+'</div></div></div>';
  if(!Object.keys(byMonth).length){html+='<div class="empty">Nessuna voce</div>';cont.innerHTML=html;return;}
  Object.keys(byMonth).sort().reverse().forEach(function(mk){
    var me=byMonth[mk].e,mi=byMonth[mk].i;
    var tE=me.reduce(function(s,e){return s+e.amount;},0);
    var tI=mi.reduce(function(s,i){return s+i.amount;},0);
    var bM=tI-tE;
    var byCat={};
    me.forEach(function(e){if(!byCat[e.cat])byCat[e.cat]=[];byCat[e.cat].push(e);});
    var cats=Object.keys(byCat).map(function(c){return{cat:c,items:byCat[c]};});
    cats.sort(function(a,b){return b.items.reduce(function(s,e){return s+e.amount;},0)-a.items.reduce(function(s,e){return s+e.amount;},0);});
    var catBlocks=cats.map(function(entry){
      var cat=entry.cat,items=entry.items;
      var tC=items.reduce(function(s,e){return s+e.amount;},0);
      var pct=Math.round(tC/tE*100);
      var tBP=items.reduce(function(s,e){return s+(e.bp?e.bp.total:0);},0);
      var bpN=tBP>0?'<span style="font-size:11px;color:#0F6E56;margin-left:8px"><i class="ti ti-ticket" style="font-size:11px"></i> - € '+fmt(tBP)+'</span>':'';
      var uid='cat-'+mk.replace('-','')+'-'+cat.replace(/\s/g,'');
      var rows=items.map(function(e){
        var bpH=e.bp?'<span style="font-size:11px;color:#0F6E56"> '+e.bp.num+'x (- € '+fmt(e.bp.total)+')</span>':'';
        var spH=e.splitPartner?'<span class="partner-badge"><i class="ti ti-users" style="font-size:10px"></i> 50%</span>':'';
        return '<div class="expense-row"><span class="exp-date">'+fmtDate(e.date)+'</span><span>'+e.desc+bpH+spH+'</span><span class="exp-amount">€ '+fmt(e.amount)+'</span><button class="exp-delete btn danger" onclick="deleteExpense('+e.id+')"><i class="ti ti-trash"></i></button></div>';
      }).join('');
      return '<div class="cat-block"><div class="cat-header" style="cursor:pointer" onclick="toggleCat(\''+uid+'\')"><div class="cat-label"><span style="width:10px;height:10px;border-radius:50%;background:'+(CAT_COLORS[cat]||'#888')+';display:inline-block"></span>'+cat+bpN+'</div><div style="display:flex;align-items:center;gap:12px"><span style="font-size:12px;color:#666">'+pct+'%</span><span style="font-weight:500;font-size:13px">€ '+fmt(tC)+'</span><i class="ti ti-chevron-down" id="ico-'+uid+'" style="font-size:14px;color:#666;transition:transform .2s"></i></div></div><div id="'+uid+'" style="display:none;padding:0 4px">'+rows+'</div></div>';
    }).join('');
    var incBlock='';
    if(mi.length){
      var iRows=mi.map(function(i){
        var bpH=i.bp?'<span style="font-size:11px;color:#0F6E56"> '+i.bp.num+'x buoni</span>':'';
        return '<div class="income-row"><span class="exp-date">'+fmtDate(i.date)+'</span><span>'+i.desc+bpH+'</span><span class="exp-amount" style="color:#085041">+ € '+fmt(i.amount)+'</span><button class="exp-delete btn danger" onclick="deleteIncome('+i.id+')"><i class="ti ti-trash"></i></button></div>';
      }).join('');
      incBlock='<div class="cat-block"><div class="cat-header" style="background:#E1F5EE;cursor:pointer" onclick="toggleCat(\'inc-'+mk.replace('-','')+'\')"><div class="cat-label" style="color:#085041"><i class="ti ti-arrow-down-circle" style="font-size:14px"></i> Entrate</div><div style="display:flex;align-items:center;gap:8px"><span style="font-weight:500;font-size:13px;color:#085041">+ € '+fmt(tI)+'</span><i class="ti ti-chevron-down" id="ico-inc-'+mk.replace('-','')+'" style="font-size:14px;color:#0F6E56;transition:transform .2s"></i></div></div><div id="inc-'+mk.replace('-','')+'" style="display:none;padding:0 4px">'+iRows+'</div></div>';
    }
    var bc=bM>=0?'#085041':'#a32d2d';
    html+='<div class="month-section"><div class="month-header"><h2>'+monthLabel(mk)+'</h2><div style="display:flex;gap:16px;font-size:13px;align-items:center">'+(tI>0?'<span style="color:#085041">+ € '+fmt(tI)+'</span>':'')+'<span style="color:#a32d2d">- € '+fmt(tE)+'</span><span style="color:'+bc+';font-weight:500">Saldo: '+(bM>=0?'+':'')+'€ '+fmt(bM)+'</span></div></div><div class="card" style="padding:.75rem">'+incBlock+catBlocks+'</div></div>';
  });
  cont.innerHTML=html;
}

function renderPartner(){
  var debiti=partnerItems.filter(function(a){return a.type==='debito';}).reduce(function(s,a){return s+a.amount;},0);
  var crediti=partnerItems.filter(function(a){return a.type==='credito';}).reduce(function(s,a){return s+a.amount;},0);
  var pagamenti=partnerItems.filter(function(a){return a.type==='pagamento';}).reduce(function(s,a){return s+a.amount;},0);
  var saldo=crediti-debiti-pagamenti;
  document.getElementById('p-debito').textContent='€ '+fmt(debiti);
  document.getElementById('p-credito').textContent='€ '+fmt(crediti);
  document.getElementById('p-saldo').textContent=(saldo>=0?'+':'')+'€ '+fmt(Math.abs(saldo));
  document.getElementById('p-saldo').style.color=saldo>=0?'#085041':'#a32d2d';
  var cont=document.getElementById('partner-container');
  if(!partnerItems.length){cont.innerHTML='<div class="empty"><i class="ti ti-users" style="font-size:32px;display:block;margin-bottom:.5rem"></i>Nessuna voce registrata</div>';return;}
  var byMonth={};
  partnerItems.forEach(function(a){var k=monthKey(a.date);if(!byMonth[k])byMonth[k]=[];byMonth[k].push(a);});
  cont.innerHTML=Object.keys(byMonth).sort().reverse().map(function(mk){
    var items=byMonth[mk];
    var mDeb=items.filter(function(a){return a.type==='debito';}).reduce(function(s,a){return s+a.amount;},0);
    var mCre=items.filter(function(a){return a.type==='credito';}).reduce(function(s,a){return s+a.amount;},0);
    var mPay=items.filter(function(a){return a.type==='pagamento';}).reduce(function(s,a){return s+a.amount;},0);
    var sMes=mCre-mDeb-mPay;
    var rows=items.map(function(a){
      var isPay=a.type==='pagamento',isD=a.type==='debito';
      var color=isD?'#a32d2d':'#085041',sign=isD?'- ':'+ ';
      var badge=isD?'<span style="font-size:10px;background:#FCEBEB;color:#a32d2d;padding:1px 6px;border-radius:5px;font-weight:500">Debito</span>':(isPay?'<span style="font-size:10px;background:#E1F5EE;color:#085041;padding:1px 6px;border-radius:5px;font-weight:500">Pagamento</span>':'<span style="font-size:10px;background:#E1F5EE;color:#085041;padding:1px 6px;border-radius:5px;font-weight:500">Credito</span>');
      var catB=a.cat?'<span style="display:inline-block;margin-left:4px;padding:1px 6px;border-radius:5px;font-size:10px;font-weight:500;background:'+(CAT_COLORS[a.cat]||'#888')+'22;color:'+(CAT_COLORS[a.cat]||'#888')+'">'+a.cat+'</span>':'';
      return '<div class="anna-row"><span class="exp-date">'+fmtDate(a.date)+'</span><span>'+a.desc+catB+(a.note?'<span style="color:#666;font-size:11px"> — '+a.note+'</span>':'')+'</span><span>'+badge+'</span><span class="exp-amount" style="color:'+color+'">'+sign+'€ '+fmt(a.amount)+'</span><button class="exp-delete btn danger" onclick="deletePartner('+a.id+')"><i class="ti ti-trash"></i></button></div>';
    }).join('');
    var sc=sMes>=0?'#085041':'#a32d2d';
    return '<div class="month-section"><div class="month-header"><h2>'+monthLabel(mk)+'</h2><span style="font-size:13px;color:'+sc+';font-weight:500">Saldo: '+(sMes>=0?'+':'')+'€ '+fmt(sMes)+'</span></div><div class="card" style="padding:.5rem 0">'+rows+'</div></div>';
  }).join('');
}

function toggleCat(uid){
  var el=document.getElementById(uid),ico=document.getElementById('ico-'+uid);
  if(!el) return;
  var open=el.style.display==='block';
  el.style.display=open?'none':'block';
  if(ico) ico.style.transform=open?'':'rotate(180deg)';
}

function exportCSV(){
  var mf=document.getElementById('f-month').value,cf=document.getElementById('f-cat').value;
  var exps=expenses.filter(function(e){return(!mf||monthKey(e.date)===mf)&&(!cf||e.cat===cf);});
  var incs=cf?[]:incomes.filter(function(i){return!mf||monthKey(i.date)===mf;});
  if(!exps.length&&!incs.length){toast('Nessun dato da esportare');return;}
  var rows=[['Tipo','Data','Descrizione','Categoria','Importo','Buoni (n)','Val. buono','Sconto buoni','Note']];
  exps.forEach(function(e){rows.push(['Spesa',e.date,e.desc,e.cat,e.amount.toFixed(2),e.bp?e.bp.num:'',e.bp?e.bp.val:'',e.bp?e.bp.total.toFixed(2):'',e.note||'']);});
  incs.forEach(function(i){rows.push(['Entrata',i.date,i.desc,'',i.amount.toFixed(2),'','','',i.note||'']);});
  var csv=rows.map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download='spese_'+currentProfile+'_export.csv';a.click();
  toast('CSV scaricato');
}

function showTab(t){
  TABS.forEach(function(id,idx){
    document.getElementById('page-'+id).classList.toggle('visible',id===t);
    document.querySelectorAll('.tab')[idx].classList.toggle('active',id===t);
  });
  if(t==='list'){populateMonthFilter();renderList();}
  if(t==='summary') renderSummary();
  if(t==='partner') renderPartner();
}

function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2500);
}

switchProfile('marco');
</script>
